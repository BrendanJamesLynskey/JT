// ─── AUDIO ────────────────────────────────────────────────
let AC=null, masterGain=null, rotorOsc=null, rotorGain=null, rotorLFO=null;
function unlockAudio(){
  if(!AC){
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = AC.createGain(); masterGain.gain.value=0.22; masterGain.connect(AC.destination);
      rotorOsc = AC.createOscillator(); rotorOsc.type='sawtooth'; rotorOsc.frequency.value=90;
      rotorGain = AC.createGain(); rotorGain.gain.value=0;
      const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=360; lp.Q.value=0.6;
      rotorOsc.connect(lp); lp.connect(rotorGain); rotorGain.connect(masterGain);
      rotorLFO = AC.createOscillator(); rotorLFO.type='sine'; rotorLFO.frequency.value=14;
      const lfoGain = AC.createGain(); lfoGain.gain.value=12;
      rotorLFO.connect(lfoGain); lfoGain.connect(rotorOsc.frequency);
      rotorOsc.start(); rotorLFO.start();
    }catch(e){/* no audio */}
  }
  // Always resume — Chrome/Safari often hand back a 'suspended' context
  // that needs an explicit resume() inside the user-gesture handler.
  if(AC && AC.state==='suspended'){
    try{ AC.resume(); }catch(_){}
  }
}
function crashBoom(){
  if(!AC) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(30,t+0.9);
  const g=AC.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.9);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.95);
}

// ─── STORM LIGHTNING ─────────────────────────────────────
let nextFlash=3 + Math.random()*6;
function tickStorm(dt){
  if(STATE.wx!=='storm') return;
  nextFlash -= dt;
  if(nextFlash<=0){
    nextFlash = 5+Math.random()*10;
    // screen flash
    const f=document.getElementById('flash');
    f.style.background='rgba(255,255,255,0.75)';
    setTimeout(()=>{f.style.background='rgba(255,255,255,0.25)';},80);
    setTimeout(()=>{f.style.background='rgba(255,255,255,0)';},200);
    if(sky && sky.material.uniforms && sky.material.uniforms.flash){
      sky.material.uniforms.flash.value = 0.6;
      setTimeout(()=>{sky.material.uniforms.flash.value=0.2;},120);
      setTimeout(()=>{sky.material.uniforms.flash.value=0.0;},280);
    }
  }
}

// ─── WORLD BUILD ───────────────────────────────────────────
let spline=null;
function buildWorld(){
  // clear previous
  while(OBSTACLES.length){
    const o=OBSTACLES.pop();
    scene.remove(o.mesh);
  }
  // clear leftover particles from prior run
  while(PARTICLES.length){
    const p=PARTICLES.pop(); scene.remove(p.sprite);
  }
  while(MISSILES.length){
    const mi=MISSILES.pop(); scene.remove(mi.mesh); scene.remove(mi.trail);
  }
  while(BULLETS.length){
    const b=BULLETS.pop(); scene.remove(b.mesh);
    if(b.mesh.geometry) b.mesh.geometry.dispose();
    if(b.mesh.material) b.mesh.material.dispose();
  }
  while(ENEMIES.length){
    const e=ENEMIES.pop(); scene.remove(e.mesh);
  }
  GUN_COOLDOWN = 0;
  GUN_HEAT = 0;
  GUN_LOCKOUT = 0;
  nextEnemyT = 6;     // first bandit ~6 s into the level
  if(terrain){scene.remove(terrain); terrain.geometry.dispose(); terrain.material.dispose(); terrain=null;}
  if(treesA){scene.remove(treesA); treesA.geometry.dispose(); treesA.material.dispose(); treesA=null;}
  if(treesB){scene.remove(treesB); treesB.geometry.dispose(); treesB.material.dispose(); treesB=null;}
  if(grassTufts){scene.remove(grassTufts); grassTufts.geometry.dispose(); grassTufts.material.dispose(); grassTufts=null;}
  if(roadObj){scene.remove(roadObj); roadObj.geometry.dispose(); roadObj.material.dispose(); roadObj=null;}
  if(heli){scene.remove(heli); heli=null;}

  buildSky();
  buildLighting();

  const rd=buildRoadSpline();
  spline=rd.spline;
  // Road is ~88 km long now; keep ~20 m sample spacing so groundY's
  // nearest-road lookup stays accurate for obstacle placement + collision.
  ROADPTS = sampleRoadPolyline(spline, 4500);
  ROAD = {distSqTo:(x,z)=>roadDistSq(x,z)};

  terrain = buildTerrain(); scene.add(terrain);
  roadObj = buildRoad(spline); scene.add(roadObj);
  // buildTrees(); // disabled — ribbon terrain leaves no useful rim for trees
  buildGrass();
  populateObstacles(spline);
  buildHeli();
  applyArcadeLook();
}

// ─── ARCADE / VECTOR LOOK ──────────────────────────────────
// Per-kind palettes — every obstacle instance picks a random colour
// from its palette, so a row of pylons is cyan/teal/aqua/turquoise
// rather than five identical cyan copies. Each kind keeps a consistent
// mood (pylons cool, turrets red, etc.) while the scene gets variety.
const KIND_PALETTE = {
  pylon:   [0x44e0ff, 0x00ffff, 0x66ffdd, 0x33ccff, 0xaaffff, 0x00ccaa],
  arch:    [0xffdd22, 0xffaa33, 0xff7722, 0xffee88, 0xffcc00, 0xffbb55],
  bldg:    [0xff55aa, 0xff33cc, 0xcc66ff, 0xff77dd, 0x9944ff, 0xff3388],
  turret:  [0xff3a3a, 0xff0055, 0xff5500, 0xff2222, 0xff6633, 0xcc0033],
  cable:   [0xcccccc, 0xaaaaaa, 0xddddee, 0xbbccbb],
  balloon: [0xff9966, 0xff4488, 0x66ff99, 0xffcc33, 0x99aaff, 0xff66ff, 0xffaa44, 0x55ffdd],
  // Rocks read as natural earth-tones so they stand out from neon obstacles.
  rock:    [0x6b5641, 0x564636, 0x4a3a2a, 0x7a6856, 0x5a4838, 0x65503e],
};
const ROAD_COLOR = 0xffffff;
// Trench walls cycle through a palette as you fly along the road so the
// valley doesn't look like one endless green tube.
const TERRAIN_PALETTE = [
  [0.13,1.00,0.40], // neon green
  [0.20,0.80,1.00], // neon blue
  [1.00,0.60,0.20], // orange
  [1.00,0.25,0.55], // hot pink
  [0.70,0.30,1.00], // purple
  [1.00,0.85,0.20], // yellow
  [0.25,1.00,0.95], // cyan
  [1.00,0.40,0.30], // coral
];
const TERRAIN_BAND_SLICES = 18; // slices per colour band (~6 km at step 110)
// Time of day controls only the sky void, fog colour/density and star
// colour — not the wireframe palette. This keeps the scene colourful.
const ARCADE_TOD = {
  dawn:  { bg:0x180a04, fog:0x3a140a, fogD:0.0055, starCol:0xffd9a6 },
  noon:  { bg:0x000c1c, fog:0x00132a, fogD:0.0040, starCol:0xffffff },
  dusk:  { bg:0x1a0620, fog:0x360a38, fogD:0.0058, starCol:0xffbce0 },
  night: { bg:0x000000, fog:0x000a04, fogD:0.0060, starCol:0x88ffaa },
};
// Weather: thicker fog + overall dimming. Storm keeps the lightning.
const ARCADE_WX = {
  clear: { fogMul:0.85, brightness:1.00 },
  haze:  { fogMul:2.00, brightness:0.82 },
  storm: { fogMul:3.20, brightness:0.55 },
};
function applyArcadeLook(){
  const tod = ARCADE_TOD[STATE.tod] || ARCADE_TOD.night;
  const wx  = ARCADE_WX[STATE.wx]  || ARCADE_WX.clear;
  // void background + tight fog from TOD, thickened by weather
  scene.background = new THREE.Color(tod.bg);
  scene.fog = new THREE.FogExp2(tod.fog, tod.fogD * wx.fogMul);
  // hide the painterly sky / sun (their textures would break the arcade look)
  if(sky){ sky.visible = false; }
  if(sunSprite){ sunSprite.visible = false; }
  if(hemi){ hemi.intensity = 0; }
  if(dirL){ dirL.intensity = 0; }
  if(ambL){ ambL.intensity = 1.0; }
  // stars tinted by TOD, opacity dimmed by weather
  if(stars){ scene.remove(stars); stars.geometry.dispose(); stars.material.dispose(); stars=null; }
  {
    const N=1400;
    const pos = new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const v = new THREE.Vector3((Math.random()-0.5), Math.random()*0.8+0.05, (Math.random()-0.5)).normalize().multiplyScalar(1700);
      pos[i*3]=v.x; pos[i*3+1]=v.y; pos[i*3+2]=v.z;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const m = new THREE.PointsMaterial({color:tod.starCol, size:2, sizeAttenuation:false, transparent:true, opacity:0.85*wx.brightness, depthWrite:false});
    stars = new THREE.Points(g,m);
    stars.renderOrder=-9;
    scene.add(stars);
  }
  // Pre-assign a palette colour to each obstacle's root mesh so every
  // child inherits it — a row of pylons becomes cyan/teal/aqua instead
  // of five identical copies.
  const colorByRoot = new Map();
  const kindByRoot = new Map();
  for(const ob of OBSTACLES){
    if(!ob.mesh) continue;
    kindByRoot.set(ob.mesh, ob.kind);
    const pal = KIND_PALETTE[ob.kind];
    if(pal) colorByRoot.set(ob.mesh, pal[Math.floor(Math.random()*pal.length)]);
  }
  const dim = (hex)=> new THREE.Color(hex).multiplyScalar(wx.brightness);
  scene.traverse(obj=>{
    // Terrain is a solid Mesh with natural vertex colours; only the
    // material.color (a multiplier on vertex colours) is dimmed by weather.
    if(obj===terrain && obj.material && obj.material.color){
      obj.material.color.setScalar(wx.brightness);
      return;
    }
    // Grass tufts use per-instance colours via InstancedMesh — keep them
    // as-is, only dim the material colour multiplier by weather.
    if(obj===grassTufts && obj.material && obj.material.color){
      obj.material.color.setScalar(wx.brightness);
      return;
    }
    if(!obj.isMesh || obj.userData.retroDone) return;
    const m = obj.material;
    if(!m) return;
    // Walk up the parent chain to find the obstacle root + its colour.
    let kind=null, rootHex=null;
    for(let cur=obj; cur; cur=cur.parent){
      const k = kindByRoot.get(cur); if(k){ kind=k; rootHex=colorByRoot.get(cur); break; }
    }
    const emissive = m.emissive && ((m.emissiveIntensity||0) > 0.5);
    let nm;
    if(emissive){
      const col = m.emissive.clone().lerp(new THREE.Color(0xffffff), 0.15);
      col.multiplyScalar(wx.brightness);
      nm = new THREE.MeshBasicMaterial({color:col});
    } else if(obj===roadObj){
      nm = new THREE.MeshBasicMaterial({ color:dim(ROAD_COLOR) });
    } else if(rootHex!=null){
      nm = new THREE.MeshBasicMaterial({ color:dim(rootHex) });
    } else if(m.color){
      nm = new THREE.MeshBasicMaterial({ color:m.color.clone().multiplyScalar(wx.brightness) });
    } else {
      nm = new THREE.MeshBasicMaterial({ color:dim(0x88ffaa) });
    }
    obj.userData.retroDone = true;
    obj.material = nm;
    if(m.dispose) m.dispose();
  });
}

// ─── COLLISION ─────────────────────────────────────────────
function checkCollisions(){
  const px=H.pos.x, py=H.pos.y, pz=H.pos.z;
  // ground
  const gy = groundY(px,pz);
  if(py-1.0 < gy){ return 'terrain'; }
  // obstacles — simple cylinder / sphere checks
  for(let i=0;i<OBSTACLES.length;i++){
    const o=OBSTACLES[i];
    const dx=px-o.pos.x, dz=pz-o.pos.z;
    const dh=Math.sqrt(dx*dx+dz*dz);
    if(dh > 120) continue;
    if(o.kind==='pylon'||o.kind==='arch'||o.kind==='bldg'||o.kind==='turret'||o.kind==='rock'){
      if(dh < o.r+1.5 && py > o.hitBot && py < o.hitTop){
        return o.kind;
      }
    } else if(o.kind==='balloon'){
      const dy=py-o.pos.y;
      if(dh*dh+dy*dy < (o.r+1.2)*(o.r+1.2)){
        return 'balloon';
      }
    } else if(o.kind==='cable'){
      // point-to-segment distance
      const ax=o.a.x, ay=o.a.y, az=o.a.z, bx=o.b.x, by=o.b.y, bz=o.b.z;
      const vx=bx-ax, vy=by-ay, vz=bz-az;
      const wx=px-ax, wy=py-ay, wz=pz-az;
      const vd=vx*vx+vy*vy+vz*vz;
      let t=(wx*vx+wy*vy+wz*vz)/vd; t=Math.max(0,Math.min(1,t));
      const cx=ax+vx*t, cy=ay+vy*t, cz=az+vz*t;
      const dx2=px-cx, dy2=py-cy, dz2=pz-cz;
      if(dx2*dx2+dy2*dy2+dz2*dz2 < 1.6*1.6) return 'cable';
    }
  }
  return null;
}

// ─── MAIN LOOP ─────────────────────────────────────────────
let DIST=0;
let MULT=1.0;
const forwardTmp=new THREE.Vector3();
const upTmp=new THREE.Vector3();
const rightTmp=new THREE.Vector3();
const eTmp=new THREE.Euler();
const qTmp=new THREE.Quaternion();
const qRot=new THREE.Quaternion();

function readInput(){
  // One unified input model: the on-screen stick + optional WASD as a
  // secondary on desktop. Stick X = steer L/R, Stick Y = climb (up)/
  // dive (down). Boost from the on-screen button or Space.
  let sx = STICK.x;
  let sy = STICK.y;
  // Keyboard augment (works everywhere; handy on desktop)
  const kx = (KEYS['KeyD']||KEYS['ArrowRight']?1:0) - (KEYS['KeyA']||KEYS['ArrowLeft']?1:0);
  const ky = (KEYS['KeyS']||KEYS['ArrowDown']?1:0) - (KEYS['KeyW']||KEYS['ArrowUp']?1:0);
  sx = Math.max(-1, Math.min(1, sx + kx));
  sy = Math.max(-1, Math.min(1, sy + ky));
  IN.roll  = sx;          // stick right → bank right → turn right
  IN.pitch = -sy;         // stick up (negative y) → climb
  IN.yaw   = 0;
  IN.thr   = 0;
  IN.boost = (TOUCH.boost || KEYS['Space']) ? 1 : 0;
}

function step(dt){
  if(!H.alive) return;
  readInput();

  // ── ARCADE FLIGHT MODEL ─────────────────────────────────────
  // Throttle is automatic. Boost is held. Pitch = climb/dive.
  // Roll is responsive and drives yaw (bank-to-turn). Auto-level
  // when no input. No stall, no gravity struggle — just fly.

  // Boost ramps in fast, decays faster
  H.boost += (IN.boost? 2.2 : -2.5) * dt;
  H.boost = Math.max(0, Math.min(1, H.boost));
  const boostF = 1 + H.boost*0.55;

  // Gentle, forgiving steering. Inverse-expo curve tames tiny movements
  // (squaring an input <1 shrinks it), a dead-zone removes jitter, and
  // modest target angles keep the horizon steady. The helicopter almost
  // flies itself; the stick nudges it.
  // Responsive but not twitchy — halfway between the old gentle stick
  // and the very snappy one.
  const dz = v => (Math.abs(v)<0.11 ? 0 : Math.sign(v)*(Math.abs(v)-0.11)/0.89);
  const shape = v => Math.sign(v) * Math.pow(Math.abs(v), 1.7);
  const rollIn  = shape(dz(IN.roll));
  const pitchIn = shape(dz(IN.pitch));
  const targetRoll  = rollIn  * 0.50;  // ~29° max bank
  const targetPitch = pitchIn * 0.31;  // ~18° max pitch
  const rollLerp  = 1 - Math.exp(-dt*4.9);
  const pitchLerp = 1 - Math.exp(-dt*4.2);
  H.ang.z += ((-targetRoll)  - H.ang.z) * rollLerp;
  H.ang.x += (( targetPitch) - H.ang.x) * pitchLerp;
  // Auto-level when stick is near centre.
  if(Math.abs(IN.roll)<0.14)  H.ang.z *= (1 - Math.min(1,dt*4.0));
  if(Math.abs(IN.pitch)<0.14) H.ang.x *= (1 - Math.min(1,dt*3.5));

  // Rebuild orientation from heading + current roll/pitch
  // Extract current heading (yaw)
  const cur = new THREE.Euler().setFromQuaternion(H.quat,'YXZ');
  let yaw = cur.y;
  // Bank-to-turn: bank angle yields yaw rate. Sign chosen so stick-right
  // banks right and turns right (Three.js YXZ: +Y yaw turns LEFT, so we
  // need yawRate to be negative when H.ang.z is negative, i.e. same sign).
  // Softer turn gain so banking feels like a gentle curve, not a whip.
  const turnRate = H.ang.z * 1.4; // rad/s
  yaw += turnRate * dt;
  // Recompose
  H.quat.setFromEuler(new THREE.Euler(H.ang.x, yaw, H.ang.z, 'YXZ'));

  // Body axes
  forwardTmp.set(0,0,-1).applyQuaternion(H.quat);
  upTmp.set(0,1,0).applyQuaternion(H.quat);
  rightTmp.set(1,0,0).applyQuaternion(H.quat);

  // Relaxed cruise — still fast, but giving the player time to react.
  // Boost becomes the "feel the rush" moment instead of the default pace.
  const diffSpd = STATE.diff==='recon' ? 38 : STATE.diff==='hot' ? 62 : 50;
  // Faster cruise per cleared level (capped so it stays controllable).
  const lvlMul = Math.min(1.6, 1 + (STATE.level-1)*0.10);
  const cruise  = diffSpd * boostF * lvlMul;
  const targetVel = forwardTmp.clone().multiplyScalar(cruise);
  // Climb/dive overlay from pitch — gentler so altitude doesn't swing wildly
  const climb = H.ang.x * 12.5;          // m/s
  targetVel.y += climb;

  // Ease current velocity toward target.
  const accel = 1 - Math.exp(-dt*3.6);
  H.vel.lerp(targetVel, accel);

  // Integrate position
  H.pos.addScaledVector(H.vel, dt);

  // Keep aircraft clear of terrain (soft arcade floor, not instant death)
  const gy=groundY(H.pos.x,H.pos.z);
  const floorY = gy + 2.5;
  if(H.pos.y < floorY){
    // strong impact → shield damage; mild scrape → push up
    const vy = H.vel.y;
    if(vy < -18 && H.invuln<=0){
      damageShield('TERRAIN');
    }
    H.pos.y = floorY;
    H.vel.y = Math.max(H.vel.y, 2);
    H.ang.x = Math.max(H.ang.x, 0.05); // nose up a touch
  }

  // Collisions with obstacles
  if(H.invuln<=0){
    const hit=checkCollisions();
    if(hit){ damageShield(hit.toUpperCase()); }
  }
  if(H.invuln>0) H.invuln -= dt;

  // rotor spin visual — tied to speed + boost (throttle is automatic now)
  const spdNow = H.vel.length();
  if(mainRotor){
    const rpm = 50 + spdNow*0.6 + H.boost*20;
    mainRotor.rotation.y += rpm*dt;
    if(mainRotor.userData.blades){
      mainRotor.userData.blades.forEach(b=>{b.rotation.y += rpm*dt;});
    }
  }
  if(tailRotor){ tailRotor.rotation.x += 45*dt + H.boost*10*dt; }

  // move helicopter group to follow the camera position (purely for rotor/tail visual)
  if(heli){
    heli.position.copy(H.pos);
    heli.quaternion.copy(H.quat);
  }

  // ── CAMERA: cockpit view with FOV pump + shake for speed feel ──
  camera.position.copy(H.pos).addScaledVector(upTmp, 0.4).addScaledVector(forwardTmp, 0.3);
  // speed feel: FOV widens with speed, more with boost
  const baseFOV = 68;
  const targetFOV = baseFOV + Math.min(18, spdNow*0.18) + H.boost*10;
  camera.fov += (targetFOV - camera.fov) * Math.min(1, dt*6);
  camera.updateProjectionMatrix();
  // shake grows with boost; decays otherwise
  H.shake = Math.max(0, H.shake - dt*2.5) + H.boost*dt*1.1;
  const shk = Math.min(0.04, H.shake*0.03);
  const rollAmt = H.ang.z;
  const sway = rollAmt*0.10 + (Math.sin(performance.now()*0.008)*0.01);
  const camEul = new THREE.Euler().setFromQuaternion(H.quat,'YXZ');
  camEul.z += sway + (Math.random()-0.5)*shk;
  camEul.x += (Math.random()-0.5)*shk*0.6;
  camera.quaternion.setFromEuler(camEul);

  // balloon drift & bob + turret firing + pickup animation/collection
  const diffCD = STATE.diff==='recon'?1.6 : STATE.diff==='hot'?0.65 : 1.0;
  const tNow = performance.now()*0.001;
  for(let i=OBSTACLES.length-1;i>=0;i--){
    const o=OBSTACLES[i];
    if(o.kind==='balloon'){
      o.mesh.position.x += o.mesh.userData.drift*dt;
      o.mesh.position.y += Math.sin(performance.now()*0.0009 + o.mesh.userData.bobPhase)*dt*0.6;
      o.pos.copy(o.mesh.position);
    } else if(o.kind==='pickup' && !o.collected){
      // spin + bob
      o.ring.rotation.z += dt*1.6;
      o.ring.rotation.x += dt*0.4;
      const bob = Math.sin(tNow*2 + o.phase)*0.5;
      o.mesh.position.y = o.pos.y + bob;
      // pulse halo
      const pulse = 1 + 0.25*Math.sin(tNow*4 + o.phase);
      o.halo.scale.set(6*pulse, 6*pulse, 6*pulse);
      // fly-through collection
      const dx=H.pos.x-o.mesh.position.x, dy=H.pos.y-o.mesh.position.y, dz=H.pos.z-o.mesh.position.z;
      if(dx*dx+dy*dy+dz*dz < (o.r+2.2)*(o.r+2.2)){
        o.collected=true;
        grantLife(0.30);
        // sparkle burst
        for(let k=0;k<6;k++){
          const v=new THREE.Vector3((Math.random()-0.5)*6, Math.random()*3, (Math.random()-0.5)*6);
          spawnFireball(o.mesh.position.clone(), 2.2+Math.random()*1.4, 0.5+Math.random()*0.3, v);
        }
        scene.remove(o.mesh);
        o.ring.geometry.dispose(); o.ring.material.dispose();
        o.halo.material.dispose();
        OBSTACLES.splice(i,1);
      }
    } else if(o.kind==='prize' && !o.collected){
      // gold gem spin + halo pulse
      o.gem.rotation.y += dt*1.4;
      o.gem.rotation.x += dt*0.7;
      const pulse = 1 + 0.30*Math.sin(tNow*5 + o.phase);
      o.halo.scale.set(8*pulse, 8*pulse, 8*pulse);
      // collect on contact
      const dx=H.pos.x-o.mesh.position.x, dy=H.pos.y-o.mesh.position.y, dz=H.pos.z-o.mesh.position.z;
      if(dx*dx+dy*dy+dz*dz < (o.r+3.5)*(o.r+3.5)){
        o.collected=true;
        DIST += 500;
        grantLife(0.20);
        STATE.prizes += 1;
        for(let k=0;k<10;k++){
          const v=new THREE.Vector3((Math.random()-0.5)*8, Math.random()*4, (Math.random()-0.5)*8);
          spawnFireball(o.mesh.position.clone(), 2.5+Math.random()*1.6, 0.6+Math.random()*0.4, v);
        }
        scene.remove(o.mesh);
        OBSTACLES.splice(i,1);
        if(STATE.prizes >= STATE.prizeGoal){ levelComplete(); }
      }
    } else if(o.kind==='turret' && o.active){
      const dx=H.pos.x-o.pos.x, dz=H.pos.z-o.pos.z;
      const d2=dx*dx+dz*dz;
      if(d2 > 500*500) continue;
      o.cooldown -= dt;
      if(o.cooldown<=0 && d2 < 420*420){
        spawnMissile(o.barrelBase, H.pos);
        o.cooldown = (1.0+Math.random()*1.0) * diffCD;
      }
    }
  }

  // distance / score (along-road projection approximated by heli forward dist)
  DIST += spdNow*dt;
  const d2 = roadDistSq(H.pos.x, H.pos.z);
  MULT = 1.0 + Math.max(0, (25*25 - d2)/(25*25)) * 2.0;

  // audio rotor sound — driven by speed + boost
  if(rotorGain && AC){
    const target = 0.08 + Math.min(0.18, spdNow*0.003) + H.boost*0.12;
    rotorGain.gain.setTargetAtTime(target, AC.currentTime, 0.08);
    const targetF = 100 + Math.min(80, spdNow*1.1) + H.boost*50;
    rotorOsc.frequency.setTargetAtTime(targetF, AC.currentTime, 0.1);
  }
}

// Shield damage on a non-fatal hit. When shield runs out, it's game over.
// Damage amounts per hit source (fraction of full life).
const DMG = { TERRAIN:0.15, MISSILE:0.20, PYLON:0.28, ARCH:0.28, BLDG:0.28, TURRET:0.22, CABLE:0.22, BALLOON:0.15, ROCK:0.20, ENEMY:0.22 };
function damageLife(cause){
  if(H.invuln>0 || !H.alive) return;
  const amt = DMG[cause] != null ? DMG[cause] : 0.22;
  H.life = Math.max(0, H.life - amt);
  H.invuln = 1.0;
  H.shake += 0.7 + amt*1.5;
  const f=document.getElementById('damvign'); if(f){ f.style.opacity='1'; setTimeout(()=>{f.style.opacity='0';},220); }
  explosionBurst(H.pos.clone(), 0.3 + amt*0.6);
  if(H.life<=0){
    H.alive=false; gameOver(cause);
  } else if(AC && rotorGain){
    const o=AC.createOscillator(); const g=AC.createGain();
    o.type='square'; o.frequency.setValueAtTime(220, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, AC.currentTime+0.2);
    g.gain.setValueAtTime(0.25, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.25);
    o.connect(g); g.connect(masterGain); o.start(); o.stop(AC.currentTime+0.26);
  }
}
// Back-compat alias so any older call sites still work.
const damageShield = damageLife;

function grantLife(amount){
  if(!H.alive) return;
  H.life = Math.min(H.maxLife, H.life + amount);
  // cheerful pickup chime
  if(AC && masterGain){
    const t=AC.currentTime;
    const o=AC.createOscillator(); const g=AC.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(660, t);
    o.frequency.exponentialRampToValueAtTime(1320, t+0.18);
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.28);
    o.connect(g); g.connect(masterGain); o.start(); o.stop(t+0.30);
  }
}

// CRT scanlines + soft edge vignette across the whole canvas.
function drawScanlines(w,h){
  hudCtx.save();
  hudCtx.fillStyle='rgba(0,0,0,0.28)';
  for(let y=0;y<h;y+=3){
    hudCtx.fillRect(0,y,w,1);
  }
  // soft edge vignette for CRT feel
  const vg = hudCtx.createRadialGradient(w*0.5, h*0.5, Math.min(w,h)*0.35, w*0.5, h*0.5, Math.max(w,h)*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  hudCtx.fillStyle = vg;
  hudCtx.fillRect(0,0,w,h);
  hudCtx.restore();
}
function drawADI(cx,cy,r,pitchDeg,rollDeg){
  hudCtx.save();
  hudCtx.translate(cx,cy);
  hudCtx.rotate(-rollDeg*Math.PI/180);
  // clip circle
  hudCtx.beginPath(); hudCtx.arc(0,0,r,0,Math.PI*2); hudCtx.clip();
  // sky/ground
  const pitchOff = pitchDeg*1.2;
  hudCtx.fillStyle='#1a3c6a'; hudCtx.fillRect(-r, -r*2+pitchOff, r*2, r*2);
  hudCtx.fillStyle='#5a3a1a'; hudCtx.fillRect(-r,  pitchOff, r*2, r*2);
  // horizon
  hudCtx.strokeStyle='#fff'; hudCtx.lineWidth=2;
  hudCtx.beginPath(); hudCtx.moveTo(-r,pitchOff); hudCtx.lineTo(r,pitchOff); hudCtx.stroke();
  // pitch ladder
  hudCtx.strokeStyle='rgba(255,255,255,0.6)'; hudCtx.lineWidth=1;
  hudCtx.font='8px "Share Tech Mono"';
  hudCtx.fillStyle='#fff';
  for(let p=-30;p<=30;p+=10){ if(p===0)continue;
    const y = pitchOff - p*1.2;
    hudCtx.beginPath(); hudCtx.moveTo(-18,y); hudCtx.lineTo(18,y); hudCtx.stroke();
  }
  hudCtx.restore();
  // border + pointer
  hudCtx.save();
  hudCtx.translate(cx,cy);
  hudCtx.strokeStyle='#aaffcc'; hudCtx.lineWidth=2;
  hudCtx.beginPath(); hudCtx.arc(0,0,r,0,Math.PI*2); hudCtx.stroke();
  // aircraft symbol (fixed)
  hudCtx.strokeStyle='#ffdd00'; hudCtx.lineWidth=2.5;
  hudCtx.beginPath();
  hudCtx.moveTo(-r*0.5,0); hudCtx.lineTo(-r*0.15,0);
  hudCtx.moveTo( r*0.15,0); hudCtx.lineTo(r*0.5,0);
  hudCtx.moveTo(0,0); hudCtx.arc(0,0,3,0,Math.PI*2);
  hudCtx.stroke();
  hudCtx.restore();
}
function drawTape(cx,cy,w,h,val,min,max,label,bigVal){
  hudCtx.save();
  hudCtx.translate(cx,cy);
  hudCtx.fillStyle='rgba(0,10,5,0.55)';
  hudCtx.fillRect(-w/2,-h/2,w,h);
  hudCtx.strokeStyle='rgba(120,255,160,0.5)';
  hudCtx.strokeRect(-w/2,-h/2,w,h);
  hudCtx.fillStyle='#8fffaa';
  hudCtx.font='10px "Share Tech Mono"';
  hudCtx.textAlign='left';
  hudCtx.fillText(label, -w/2+6, -h/2+12);
  hudCtx.font='bold 26px "Orbitron"';
  hudCtx.textAlign='center'; hudCtx.fillStyle='#ddffe8';
  hudCtx.fillText(String(bigVal), 0, 10);
  // mini tape scale
  const cur=val;
  const step=10;
  hudCtx.font='8px "Share Tech Mono"';
  hudCtx.fillStyle='#8fffaa';
  hudCtx.textAlign='right';
  const top = Math.ceil((cur-20)/step)*step;
  for(let v=top; v<=cur+20; v+=step){
    const y = (cur - v)*1.2 + 20;
    if(y<-h/2+14||y>h/2-4) continue;
    hudCtx.fillText(v, w/2-6, y);
    hudCtx.fillRect(w/2-14, y-1, 6, 1);
  }
  hudCtx.restore();
}
function drawHeading(cx,cy,w,deg){
  // Scrolling compass tape: ticks slide horizontally so the centre
  // always reads the current heading. Pixels-per-degree is fixed.
  const PPD = 1.6;
  const halfDeg = (w/2)/PPD;
  hudCtx.save();
  hudCtx.translate(cx,cy);
  hudCtx.fillStyle='rgba(0,10,5,0.5)';
  hudCtx.fillRect(-w/2,-14,w,28);
  hudCtx.strokeStyle='rgba(120,255,160,0.5)';
  hudCtx.strokeRect(-w/2,-14,w,28);
  // clip so ticks don't leak past the box
  hudCtx.beginPath(); hudCtx.rect(-w/2+1,-14,w-2,28); hudCtx.clip();
  hudCtx.font='11px "Share Tech Mono"';
  hudCtx.fillStyle='#8fffaa';
  hudCtx.textAlign='center';
  // Walk every 5° in [-halfDeg, +halfDeg] around current heading.
  const start = Math.ceil((deg - halfDeg)/5)*5;
  const end   = Math.floor((deg + halfDeg)/5)*5;
  for(let h=start; h<=end; h+=5){
    const x = (h - deg) * PPD;
    const wrapped = ((h%360)+360)%360;
    const major = (wrapped%30)===0;
    hudCtx.fillRect(x, -14, 1, major?10:5);
    if(major){
      let label;
      if(wrapped===0)        label='N';
      else if(wrapped===90)  label='E';
      else if(wrapped===180) label='S';
      else if(wrapped===270) label='W';
      else label=String(wrapped/10|0).padStart(2,'0');
      hudCtx.fillText(label, x, 10);
    }
  }
  hudCtx.restore();
  // centre indicator (drawn after restore so it sits above the clipped tape)
  hudCtx.save();
  hudCtx.strokeStyle='#ffdd00'; hudCtx.lineWidth=2;
  hudCtx.beginPath(); hudCtx.moveTo(cx,cy-18); hudCtx.lineTo(cx,cy+14); hudCtx.stroke();
  hudCtx.restore();
}

// Speed streaks — 2D radial lines from centre to reinforce forward motion.
const STREAKS = [];
for(let i=0;i<34;i++){
  STREAKS.push({a:Math.random()*Math.PI*2, r:0.25+Math.random()*0.8, spd:0.6+Math.random()*1.4, len:0.08+Math.random()*0.18});
}
function drawSpeedStreaks(spd,boost){
  const w=window.innerWidth, h=window.innerHeight;
  const cx=w*0.5, cy=h*0.5;
  // intensity scales with speed + boost
  const intensity = Math.min(1, spd/70) + boost*0.6;
  if(intensity<0.05) return;
  const diag = Math.hypot(w,h)*0.5;
  hudCtx.save();
  hudCtx.globalCompositeOperation='lighter';
  hudCtx.strokeStyle='rgba(255,255,255,'+ (0.10+0.35*intensity).toFixed(2) +')';
  hudCtx.lineWidth = 1.2 + boost*1.4;
  for(const s of STREAKS){
    // advance outward; wrap
    s.r += s.spd * (0.012 + 0.04*intensity);
    if(s.r>1.25){ s.r = 0.08; s.a = Math.random()*Math.PI*2; }
    const r0 = s.r * diag;
    const r1 = (s.r - s.len*(0.6+boost*0.8)) * diag;
    if(r1<=0) continue;
    const ca=Math.cos(s.a), sa=Math.sin(s.a);
    hudCtx.beginPath();
    hudCtx.moveTo(cx + ca*r0, cy + sa*r0);
    hudCtx.lineTo(cx + ca*r1, cy + sa*r1);
    hudCtx.stroke();
  }
  hudCtx.restore();
}
function drawStick(cx,cy,x,y){
  hudCtx.save();
  hudCtx.strokeStyle='rgba(180,230,255,0.5)';
  hudCtx.fillStyle='rgba(30,60,90,0.25)';
  hudCtx.lineWidth=2;
  hudCtx.beginPath(); hudCtx.arc(cx,cy,STICK_R,0,Math.PI*2); hudCtx.fill(); hudCtx.stroke();
  hudCtx.fillStyle='rgba(180,230,255,0.8)';
  hudCtx.beginPath(); hudCtx.arc(cx+x*STICK_R, cy+y*STICK_R, 22, 0, Math.PI*2); hudCtx.fill();
  hudCtx.restore();
}
function drawStickHint(cx,cy,label){

  hudCtx.strokeStyle='rgba(180,230,255,0.2)';
  hudCtx.lineWidth=1.5;

}

// ─── GAME FLOW ─────────────────────────────────────────────
function startGame(){
  if(!WEBGL_OK){ return; }
  unlockAudio();
  STATE.started=true; STATE.over=false;
  document.getElementById('overlay').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('menuBtn').style.display='block';
  document.getElementById('boostBtn').style.display='block';
  document.getElementById('fireBtn').style.display='block';
  stickBaseEl.style.display='block';
  document.getElementById('instr-panel').textContent =
    'STICK to steer + climb/dive   FIRE to shoot   BOOST to push harder';

  DIST=0; MULT=1.0;
  STATE.level=1; STATE.prizes=0; STATE.prizeGoal=5;
  buildWorld();
  resetHeli();
  nextFlash = 3 + Math.random()*4;
}
// Triggered when STATE.prizes reaches STATE.prizeGoal — bumps the level
// counter, rebuilds the world (denser, faster) and tops up the heli.
function levelComplete(){
  if(!STATE.started || STATE.over) return;
  STATE.level += 1;
  STATE.prizes = 0;
  STATE.prizeGoal = 5;        // keep the goal at 5 each level
  // refill life as a reward
  H.life = H.maxLife;
  // brief on-screen banner
  const banner = document.getElementById('lvlBanner');
  if(banner){
    banner.textContent = 'LEVEL '+(STATE.level-1)+' COMPLETE — STARTING LEVEL '+STATE.level;
    banner.style.opacity='1';
    setTimeout(()=>{ banner.style.opacity='0'; }, 2200);
  }
  // chime
  if(AC && masterGain){
    const t=AC.currentTime;
    [880,1320,1760].forEach((f,k)=>{
      const o=AC.createOscillator(); const g=AC.createGain();
      o.type='triangle'; o.frequency.setValueAtTime(f, t+k*0.10);
      g.gain.setValueAtTime(0.16, t+k*0.10);
      g.gain.exponentialRampToValueAtTime(0.001, t+k*0.10+0.30);
      o.connect(g); g.connect(masterGain); o.start(t+k*0.10); o.stop(t+k*0.10+0.32);
    });
  }
  // Rebuild world & reset heli, but keep DIST/MULT/timer for cumulative score.
  buildWorld();
  resetHeli();
}
function restartGame(){
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('boostBtn').style.display='block';
  document.getElementById('fireBtn').style.display='block';
  stickBaseEl.style.display='block';
  STATE.level=1; STATE.prizes=0; STATE.prizeGoal=5;
  STATE.over=false; STATE.started=true;
  DIST=0; MULT=1.0;
  buildWorld();
  resetHeli();
}
function goMenu(){
  STATE.started=false; STATE.over=false;
  document.getElementById('gameover').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('menuBtn').style.display='none';
  document.getElementById('boostBtn').style.display='none';
  document.getElementById('fireBtn').style.display='none';
  stickBaseEl.style.display='none';
  releaseStick();
  // Silence the rotor — otherwise the hum keeps playing in the menu.
  if(rotorGain && AC){ rotorGain.gain.setTargetAtTime(0, AC.currentTime, 0.05); }
  document.getElementById('overlay').style.display='flex';
  hudCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
}
const QUIPS={
  TERRAIN:'Nap-of-the-earth was a bit too literal.',
  PYLON:'The tower won the argument.',
  ARCH:'That arch wasn\'t a shortcut.',
  BLDG:'Property damage insurance: void.',
  BALLOON:'Somebody is very sad right now.',
  CABLE:'Invisible cables strike again.',
  MISSILE:'A turret remembered your name.',
  ROCK:'That outcrop wasn\'t bluffing.',
  ENEMY:'A bandit got the better of you.',
  TURRET:'The turret won the stand-off.',
};
function gameOver(cause){
  STATE.over=true;
  crashBoom();
  // Big fireball slightly ahead of the cockpit so we see it expand.
  const crashPos = H.pos.clone();
  const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(H.quat);
  crashPos.addScaledVector(fwd, 6);
  explosionBurst(crashPos, 1.6);
  H.shake = 3.5;
  const t=(performance.now()/1000 - H.startT);
  document.getElementById('goquip').textContent = QUIPS[cause] || 'Crashed.';
  document.getElementById('gostats').innerHTML =
    'CAUSE: <span>'+cause+'</span><br>'+
    'DIST: <span>'+Math.round(DIST)+' m</span><br>'+
    'TIME: <span>'+t.toFixed(1)+' s</span><br>'+
    'BEST MULT: <span>x'+MULT.toFixed(2)+'</span>';
  document.getElementById('hud').style.display='none';
  document.getElementById('boostBtn').style.display='none';
  document.getElementById('fireBtn').style.display='none';
  stickBaseEl.style.display='none';
  releaseStick();
  // Let the explosion play before the panel pops up.
  setTimeout(()=>{ if(STATE.over) document.getElementById('gameover').style.display='flex'; }, 1500);
  if(rotorGain && AC){ rotorGain.gain.setTargetAtTime(0, AC.currentTime, 0.2); }
}

// ─── RENDER LOOP ───────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, clock.getDelta());
  if(STATE.started && !STATE.over){
    step(dt);
    tickStorm(dt);
  }
  // particles (explosion debris/smoke) keep animating even after crash
  if(STATE.started){ tickParticles(dt); tickMissiles(dt); tickBullets(dt); tickEnemies(dt); }
  // persistent shake during crash sequence
  if(STATE.started && STATE.over && H.shake>0){
    H.shake = Math.max(0, H.shake - dt*1.2);
    const shk = Math.min(0.08, H.shake*0.04);
    const ce = new THREE.Euler().setFromQuaternion(camera.quaternion,'YXZ');
    ce.z += (Math.random()-0.5)*shk;
    ce.x += (Math.random()-0.5)*shk*0.6;
    camera.quaternion.setFromEuler(ce);
  }
  if(STATE.started){
    document.getElementById('distv').textContent = Math.round(DIST);
    document.getElementById('multv').textContent = MULT.toFixed(2);
    document.getElementById('lvlv').textContent = STATE.level;
    document.getElementById('przv').textContent = STATE.prizes;
    document.getElementById('przgv').textContent = STATE.prizeGoal;
    document.getElementById('timev').textContent = Math.max(0,(performance.now()/1000 - H.startT)).toFixed(1);
  }
  if(WEBGL_OK){ renderer.render(scene, camera); }
  if(STATE.started){ drawCockpitAndHUD(); }
}
loop();

// ─── IOS AUDIO UNLOCK ON FIRST TAP ────────────────────────
document.addEventListener('pointerdown', ()=>{
  if(!AC) unlockAudio();
  if(AC && AC.state==='suspended'){ AC.resume(); }
}, {once:false});

</script>
