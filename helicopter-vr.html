<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>ROTOR — LOW FLIGHT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;touch-action:none;overscroll-behavior:none;}
#c{display:block;position:absolute;top:0;left:0;z-index:1;width:100vw;height:100vh;}
#gc{display:block;position:absolute;top:0;left:0;z-index:2;pointer-events:none;width:100vw;height:100vh;}

#overlay{position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 30%,#0a1a2a 0%,#020508 70%,#000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:18px;overflow-y:auto;}
#overlay h1{font-family:'Orbitron',sans-serif;font-weight:700;font-size:clamp(1.8rem,6vw,4.4rem);
  color:#6ed7ff;letter-spacing:6px;text-shadow:0 0 16px #2a7fbf,0 0 40px #0f4f7f;text-align:center;line-height:1.1;}
#overlay h1 small{display:block;font-size:.45em;color:#9fe6ff;letter-spacing:8px;margin-top:6px;opacity:.7;}
#overlay h2{font-family:'Orbitron',sans-serif;color:#aacfff;letter-spacing:5px;font-size:.85rem;opacity:.7;}
.row{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%;max-width:720px;}
.rlabel{font-family:'Orbitron',sans-serif;color:#7ab5e0;font-size:.78rem;letter-spacing:3px;}
.egrid{display:grid;gap:8px;width:100%;}
.g3{grid-template-columns:repeat(3,1fr);}
.g4{grid-template-columns:repeat(4,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.ebtn{background:rgba(40,100,180,.10);border:1.5px solid rgba(80,160,220,.35);color:#bcd8ec;
  padding:10px 6px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:.78rem;letter-spacing:1px;
  border-radius:4px;text-align:center;transition:all .15s;}
.ebtn:hover,.ebtn.sel{background:rgba(60,160,240,.22);border-color:#6ed7ff;color:#fff;
  box-shadow:0 0 14px rgba(80,200,255,.45);}
.ebtn span{font-size:1.4rem;display:block;margin-bottom:2px;}
.ebtn{position:relative;}
.autotag{display:none;position:absolute;top:3px;right:4px;font-size:.55rem;letter-spacing:1px;
  color:#0b1420;background:#7ee0ff;padding:1px 4px;border-radius:2px;font-weight:700;}
.ebtn.autosel .autotag{display:block;}
#startBtn{background:linear-gradient(135deg,#1a4d7a,#3ea2e0);color:#fff;border:none;
  padding:14px 52px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:4px;
  cursor:pointer;border-radius:5px;box-shadow:0 0 22px #3fa2e0;transition:transform .15s;margin-top:6px;}
#startBtn:hover{transform:scale(1.04);}
.hint{color:#7ab5e0;font-size:.72rem;text-align:center;line-height:1.8;max-width:700px;}
.hint b{color:#bcd8ec;}
#errmsg{color:#ff6666;font-size:.9rem;text-align:center;display:none;padding:10px;border:1px solid #ff6666;border-radius:4px;}

#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;}
#topbar{position:absolute;top:env(safe-area-inset-top,10px);left:10px;right:10px;
  display:flex;justify-content:space-between;font-family:'Orbitron',sans-serif;font-size:.8rem;color:#8fffaa;
  text-shadow:0 0 4px #00ff66;}
#topbar .blk{background:rgba(0,20,10,.55);border:1px solid rgba(0,255,130,.3);padding:5px 10px;border-radius:3px;}
#scorehud span{color:#fff;}
#instr-panel{position:absolute;bottom:env(safe-area-inset-bottom,14px);left:50%;transform:translateX(-50%);
  font-family:'Share Tech Mono',monospace;color:#8fffaa;font-size:.78rem;text-align:center;
  background:rgba(0,20,10,.45);border:1px solid rgba(0,255,130,.3);padding:4px 10px;border-radius:3px;opacity:.55;}

#boostBtn{position:fixed;right:24px;bottom:calc(env(safe-area-inset-bottom,18px) + 18px);
  width:84px;height:84px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,140,40,.35),rgba(180,60,0,.1) 70%);
  border:2px solid #ff8a33;color:#ffe0a0;font-family:'Orbitron',sans-serif;letter-spacing:2px;font-size:.85rem;
  z-index:15;display:none;cursor:pointer;touch-action:none;user-select:none;
  box-shadow:0 0 18px rgba(255,140,40,.55);}
#boostBtn.active{background:radial-gradient(circle,#ffaa33,#aa4400 70%);color:#fff;}

#fireBtn{position:fixed;left:24px;bottom:calc(env(safe-area-inset-bottom,18px) + 18px);
  width:84px;height:84px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,60,60,.35),rgba(180,0,0,.1) 70%);
  border:2px solid #ff4444;color:#ffcccc;font-family:'Orbitron',sans-serif;letter-spacing:2px;font-size:.85rem;
  z-index:15;display:none;cursor:pointer;touch-action:none;user-select:none;
  box-shadow:0 0 18px rgba(255,60,60,.55);}
#fireBtn.active{background:radial-gradient(circle,#ff6666,#aa0000 70%);color:#fff;}
#fireBtn.cooling{background:radial-gradient(circle,rgba(80,140,200,.5),rgba(20,40,80,.2) 70%);
  border-color:#5fb6ff;color:#bcdcff;
  box-shadow:0 0 18px rgba(120,200,255,.55);}

#lvlBanner{position:fixed;top:25%;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-size:1.6rem;letter-spacing:4px;
  color:#ffe055;text-shadow:0 0 12px #ffaa00, 0 0 24px #ff6600;
  background:rgba(0,0,0,0.45);padding:14px 26px;border:2px solid #ffe055;border-radius:6px;
  pointer-events:none;opacity:0;transition:opacity .35s;z-index:30;}

#stickBase{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,18px) + 24px);
  transform:translateX(-50%);
  width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(30,60,90,.55),rgba(10,30,50,.25) 78%);
  border:2px solid rgba(120,200,255,.55);display:none;touch-action:none;user-select:none;
  z-index:15;box-shadow:0 0 22px rgba(60,180,255,.35);}
#stickKnob{position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px 0 0 -32px;
  border-radius:50%;background:radial-gradient(circle,#a7e5ff,#2c6fa4);
  box-shadow:0 0 14px rgba(100,220,255,.8);pointer-events:none;transition:transform .05s linear;}
#stickLabel{position:absolute;top:-20px;left:0;width:100%;text-align:center;color:#7ac0e0;
  font:700 .65rem 'Orbitron',sans-serif;letter-spacing:3px;opacity:.75;pointer-events:none;}
#stickBase::before,#stickBase::after{content:'';position:absolute;left:50%;top:50%;width:2px;height:2px;
  background:rgba(120,200,255,.25);}
#stickBase::before{width:100%;height:1px;left:0;top:50%;transform:translateY(-0.5px);}
#stickBase::after{width:1px;height:100%;left:50%;top:0;transform:translateX(-0.5px);}

#menuBtn{position:fixed;top:calc(env(safe-area-inset-top,10px) + 70px);right:10px;
  width:40px;height:40px;border-radius:4px;background:rgba(0,20,10,.55);border:1px solid rgba(0,255,130,.3);
  color:#8fffaa;font-family:'Orbitron',sans-serif;font-size:.7rem;z-index:20;display:none;cursor:pointer;}

#gameover{position:fixed;inset:0;background:rgba(3,10,18,.92);z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px;}
#gameover h1{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,7vw,4rem);color:#ff5555;
  text-shadow:0 0 30px #ff2200;letter-spacing:6px;}
#goquip{font-family:'Orbitron',sans-serif;font-size:1rem;color:#ffaa55;letter-spacing:3px;}
#gostats{color:#bcd8ec;font-size:1.05rem;line-height:2;text-align:center;font-family:'Share Tech Mono',monospace;}
#gostats span{color:#fff;}
.gbtn{background:linear-gradient(135deg,#1a4d7a,#3ea2e0);color:#fff;border:none;
  padding:11px 36px;font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:3px;
  cursor:pointer;border-radius:5px;margin:0 6px;}
.gbtn.alt{background:linear-gradient(135deg,#2a2a2a,#555);}
.gbtn:hover{transform:scale(1.04);}

#flash{position:fixed;inset:0;background:rgba(255,255,255,0);pointer-events:none;z-index:12;transition:background .12s;}
#damvign{position:fixed;inset:0;pointer-events:none;z-index:8;
  box-shadow:inset 0 0 240px 40px rgba(0,0,0,.55);background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.55) 100%);}
</style>
</head>
<body>

<div id="overlay">
  <h1>ROTOR<small>— LOW FLIGHT —</small></h1>
  <h2>VALLEY PATROL / NAP-OF-THE-EARTH</h2>

  <div class="row"><div class="rlabel">DIFFICULTY</div>
    <div class="egrid g3" style="max-width:520px;">
      <div class="ebtn" data-grp="diff" data-val="recon"><span>EASY</span>Recon</div>
      <div class="ebtn sel" data-grp="diff" data-val="patrol"><span>STD</span>Patrol</div>
      <div class="ebtn" data-grp="diff" data-val="hot"><span>HOT</span>Hot Zone</div>
    </div>
  </div>

  <div class="row"><div class="rlabel">TIME OF DAY</div>
    <div class="egrid g4" style="max-width:620px;">
      <div class="ebtn" data-grp="tod" data-val="dawn"><span>&#127746;</span>Dawn</div>
      <div class="ebtn sel" data-grp="tod" data-val="noon"><span>&#9728;&#65039;</span>Noon</div>
      <div class="ebtn" data-grp="tod" data-val="dusk"><span>&#127751;</span>Dusk</div>
      <div class="ebtn" data-grp="tod" data-val="night"><span>&#127769;</span>Night</div>
    </div>
  </div>

  <div class="row"><div class="rlabel">WEATHER</div>
    <div class="egrid g3" style="max-width:520px;">
      <div class="ebtn sel" data-grp="wx" data-val="clear"><span>&#9728;&#65039;</span>Clear</div>
      <div class="ebtn" data-grp="wx" data-val="haze"><span>&#127787;</span>Haze</div>
      <div class="ebtn" data-grp="wx" data-val="storm"><span>&#9889;</span>Storm</div>
    </div>
  </div>

  <div class="row"><div class="rlabel">CONTROLS</div>
    <div class="egrid g2" style="max-width:420px;" id="ctlGrid">
      <div class="ebtn" data-grp="ctl" data-val="touch"><span>&#128241;</span>Touch<div class="autotag">AUTO</div></div>
      <div class="ebtn" data-grp="ctl" data-val="desktop"><span>&#128187;</span>Desktop<div class="autotag">AUTO</div></div>
    </div>
  </div>

  <button id="startBtn" onclick="startGame()">START FLIGHT</button>
  <div class="hint" id="hintText"></div>
  <div id="errmsg"></div>
</div>

<canvas id="c"></canvas>
<canvas id="gc"></canvas>
<div id="damvign"></div>
<div id="flash"></div>

<div id="hud">
  <div id="topbar">
    <div class="blk" id="scorehud">DIST <span id="distv">0</span> m &nbsp;&nbsp; x<span id="multv">1.0</span></div>
    <div class="blk" id="prizehud">LVL <span id="lvlv">1</span> &nbsp; URANIUM <span id="przv">0</span>/<span id="przgv">5</span></div>
    <div class="blk" id="timehud">T+<span id="timev">0</span>s</div>
  </div>
  <div id="instr-panel"></div>
</div>
<div id="stickBase">
  <div id="stickLabel">STICK</div>
  <div id="stickKnob"></div>
</div>
<div id="lvlBanner"></div>
<button id="fireBtn">FIRE</button>
<button id="boostBtn">BOOST</button>
<button id="menuBtn" onclick="goMenu()">MENU</button>

<div id="gameover">
  <h1>ROTOR DOWN</h1>
  <div id="goquip"></div>
  <div id="gostats"></div>
  <div>
    <button class="gbtn" onclick="restartGame()">FLY AGAIN</button>
    <button class="gbtn alt" onclick="goMenu()">MENU</button>
  </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

// ============================================================
//  ROTOR — LOW FLIGHT
//  Single-file Three.js helicopter flight toy with procedural
//  terrain, winding road, obstacles, cockpit HUD, touch+keys.
// ============================================================

const STATE={
  diff:'patrol', tod:'noon', wx:'clear', ctl:'touch',
  started:false, over:false,
  // Level progression: collect PRIZE_GOAL prizes to clear the level;
  // each new level bumps obstacle density, missile speed and turret rate.
  level:1, prizes:0, prizeGoal:5,
};

// Detect platform --------------------------------------------
// Flag a device as touch if it has a touch interface AND a coarse pointer
// (iPhone / iPad / Android). Laptops with touchscreens still report a
// fine pointer, so they get the Desktop default.
const HAS_TOUCH=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
const COARSE=(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
const IS_TOUCH = HAS_TOUCH && COARSE;
const AUTO_CTL = IS_TOUCH ? 'touch' : 'desktop';
STATE.ctl = AUTO_CTL;

// ─── OVERLAY UI ─────────────────────────────────────────────
document.querySelectorAll('.ebtn').forEach(b=>{
  b.addEventListener('click',()=>{
    const g=b.dataset.grp;
    document.querySelectorAll('.ebtn[data-grp="'+g+'"]').forEach(x=>x.classList.remove('sel'));
    b.classList.add('sel');
    STATE[g]=b.dataset.val;
    updateHint();
  });
});
// Apply auto-detected default to CONTROLS + mark the AUTO tile
document.querySelectorAll('.ebtn[data-grp="ctl"]').forEach(b=>{
  b.classList.toggle('sel',     b.dataset.val===STATE.ctl);
  b.classList.toggle('autosel', b.dataset.val===AUTO_CTL);
});
// Apply initial .sel for other groups (matches STATE defaults)
['diff','tod','wx'].forEach(g=>{
  document.querySelectorAll('.ebtn[data-grp="'+g+'"]').forEach(b=>{
    b.classList.toggle('sel', b.dataset.val===STATE[g]);
  });
});
function updateHint(){
  const el=document.getElementById('hintText');
  const extra = (STATE.ctl==='desktop')
    ? ' &nbsp;Keys: <b>A/D</b> or <b>&larr;/&rarr;</b> steer, <b>W/S</b> or <b>&uarr;/&darr;</b> climb/dive, <b>Space</b> boost, <b>F</b> fire.'
    : '';
  el.innerHTML='Drag the on-screen <b>STICK</b> (bottom-centre) to steer + climb/dive. Hold <b>FIRE</b> (left) to shoot; <b>BOOST</b> (right) to push faster. Throttle is automatic.'+extra;
}
updateHint();

// ─── THREE SETUP ─────────────────────────────────────────────
let renderer, scene, camera, clock, hud2d, hudCtx;
let WEBGL_OK=true;
try{
  renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
} catch(e){
  WEBGL_OK=false;
  const em=document.getElementById('errmsg');
  em.style.display='block';
  em.textContent='WebGL failed to initialise on this device. '+e.message;
}

scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.5, 2500);
clock = new THREE.Clock();
hud2d = document.getElementById('gc');
hudCtx = hud2d.getContext('2d');

function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  if(renderer){ renderer.setSize(w,h,false); }
  camera.aspect=w/h; camera.updateProjectionMatrix();
  const dpr=Math.min(window.devicePixelRatio||1,1.5);
  hud2d.width=w*dpr; hud2d.height=h*dpr; hud2d.style.width=w+'px'; hud2d.style.height=h+'px';
  hudCtx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

// ─── TOD / WEATHER PRESETS ──────────────────────────────────
const TOD_PRESETS={
  dawn:{top:[1.0,0.55,0.45], bot:[1.0,0.78,0.55], sunDir:[0.6,0.35,0.7], sunColor:0xffd6a0, sunAlt:0.35, amb:0x553322, hemi:[0xffbb88,0x553322,0.45], fog:0xe8b088, fogD:0.0022, dir:0xffd1a0, dirI:0.85, star:0},
  noon:{top:[0.18,0.45,0.8], bot:[0.72,0.88,0.98], sunDir:[0.3,0.9,0.4], sunColor:0xffffff, sunAlt:0.85, amb:0x4a6a8a, hemi:[0x87ceeb,0x3a5a3a,0.65], fog:0xb9cfe0, fogD:0.0012, dir:0xffffff, dirI:1.0, star:0},
  dusk:{top:[0.25,0.1,0.35], bot:[1.0,0.45,0.25], sunDir:[-0.5,0.2,-0.6], sunColor:0xff7733, sunAlt:0.22, amb:0x442233, hemi:[0xff7755,0x221133,0.4], fog:0xc86644, fogD:0.0022, dir:0xff9955, dirI:0.7, star:0},
  night:{top:[0.01,0.02,0.08], bot:[0.06,0.08,0.15], sunDir:[-0.3,0.55,-0.7], sunColor:0xaabbff, sunAlt:0.7, amb:0x223355, hemi:[0x445577,0x111122,0.3], fog:0x0a1020, fogD:0.0028, dir:0x99aadd, dirI:0.35, star:1},
};
const WX_MOD={
  clear:{fogMul:1.0, dirMul:1.0, ambMul:1.0, storm:false},
  haze :{fogMul:2.2, dirMul:0.8, ambMul:0.9, storm:false},
  storm:{fogMul:3.2, dirMul:0.4, ambMul:0.7, storm:true},
};

let sky, sunSprite, hemi, dirL, ambL, fogC, stars;

function buildSky(){
  if(sky){scene.remove(sky); sky.geometry.dispose(); sky.material.dispose();}
  const geo = new THREE.SphereGeometry(1800,32,16);
  const p = TOD_PRESETS[STATE.tod];
  const mat = new THREE.ShaderMaterial({
    side:THREE.BackSide, depthWrite:false,
    uniforms:{
      topC:{value:new THREE.Color().fromArray(p.top)},
      botC:{value:new THREE.Color().fromArray(p.bot)},
      sunDir:{value:new THREE.Vector3().fromArray(p.sunDir).normalize()},
      sunColor:{value:new THREE.Color(p.sunColor)},
      stormy:{value:STATE.wx==='storm'?1.0:0.0},
      flash:{value:0.0},
    },
    vertexShader:`
      varying vec3 vW;
      void main(){
        vW=normalize(position);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
      }`,
    fragmentShader:`
      varying vec3 vW;
      uniform vec3 topC; uniform vec3 botC; uniform vec3 sunDir; uniform vec3 sunColor;
      uniform float stormy; uniform float flash;
      void main(){
        float t = clamp(vW.y*0.5+0.5, 0.0, 1.0);
        vec3 col = mix(botC, topC, pow(t, 1.2));
        float d = max(dot(normalize(vW), normalize(sunDir)), 0.0);
        col += sunColor * pow(d, 160.0) * 1.4;
        col += sunColor * pow(d, 8.0) * 0.25;
        col = mix(col, col*vec3(0.35,0.4,0.5), stormy*0.55);
        col += vec3(flash);
        gl_FragColor = vec4(col,1.0);
      }`
  });
  sky = new THREE.Mesh(geo, mat);
  sky.renderOrder = -10;
  scene.add(sky);
}

function makeSunSprite(col){
  const cvs = document.createElement('canvas'); cvs.width=cvs.height=256;
  const g = cvs.getContext('2d');
  const rg = g.createRadialGradient(128,128,4,128,128,128);
  const c = new THREE.Color(col);
  const hex = '#'+c.getHexString();
  rg.addColorStop(0,'rgba(255,255,255,1)');
  rg.addColorStop(0.18,hex);
  rg.addColorStop(0.55,'rgba('+(c.r*255|0)+','+(c.g*255|0)+','+(c.b*255|0)+',0.25)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=rg; g.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(cvs);
  const mat = new THREE.SpriteMaterial({map:tex, blending:THREE.AdditiveBlending, depthWrite:false, depthTest:false, transparent:true});
  return new THREE.Sprite(mat);
}

function buildLighting(){
  const p = TOD_PRESETS[STATE.tod], w=WX_MOD[STATE.wx];
  if(hemi)scene.remove(hemi);
  if(dirL)scene.remove(dirL);
  if(ambL)scene.remove(ambL);
  hemi = new THREE.HemisphereLight(p.hemi[0], p.hemi[1], p.hemi[2]*w.ambMul);
  scene.add(hemi);
  ambL = new THREE.AmbientLight(p.amb, 0.4*w.ambMul);
  scene.add(ambL);
  dirL = new THREE.DirectionalLight(p.dir, p.dirI*w.dirMul);
  dirL.position.set(p.sunDir[0], p.sunDir[1], p.sunDir[2]).normalize().multiplyScalar(600);
  scene.add(dirL);
  fogC = new THREE.Color(p.fog);
  scene.fog = new THREE.FogExp2(fogC.getHex(), p.fogD*w.fogMul);
  scene.background = null; // sky dome handles it

  if(sunSprite){scene.remove(sunSprite); sunSprite.material.map.dispose(); sunSprite.material.dispose();}
  sunSprite = makeSunSprite(p.sunColor);
  const s = STATE.tod==='noon'?90:130;
  sunSprite.scale.set(s,s,1);
  const sd=new THREE.Vector3().fromArray(p.sunDir).normalize().multiplyScalar(1500);
  sunSprite.position.copy(sd);
  scene.add(sunSprite);

  if(stars){scene.remove(stars); stars.geometry.dispose(); stars.material.dispose(); stars=null;}
  if(p.star){
    const N=1200;
    const pos = new Float32Array(N*3);
    for(let i=0;i<N;i++){
      const v = new THREE.Vector3((Math.random()-0.5), Math.random()*0.7+0.05, (Math.random()-0.5)).normalize().multiplyScalar(1700);
      pos[i*3]=v.x; pos[i*3+1]=v.y; pos[i*3+2]=v.z;
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const m = new THREE.PointsMaterial({color:0xffffff, size:2.2, sizeAttenuation:false, transparent:true, opacity:0.85, depthWrite:false});
    stars = new THREE.Points(g,m);
    stars.renderOrder=-9;
    scene.add(stars);
  }
}

// ─── NOISE (simple sum-of-sines pseudo-noise) ─────────────
function pnoise(x,z){
  // layered sines — cheap but plenty for rolling hills
  let n = 0;
  n += Math.sin(x*0.013 + z*0.008)*14;
  n += Math.sin(x*0.028 - z*0.019 + 1.3)*7.2;
  n += Math.sin(x*0.055 + z*0.047 + 2.7)*3.1;
  n += Math.sin(x*0.11 - z*0.093 + 4.1)*1.4;
  n += Math.sin(x*0.22 + z*0.21 + 0.9)*0.6;
  return n;
}
function hashFloat(i){ const s=Math.sin(i*12.9898)*43758.5453; return s-Math.floor(s); }

// terrain ground level at world (x,z). Valley along road centre.
let ROAD; // filled below
function groundY(x,z){
  // Trench geometry: narrow flat floor, near-vertical walls rising fast.
  // Walls cap high so you feel genuinely boxed in.
  const nr = roadNearest(x,z);
  const d = Math.sqrt(nr.d2);
  const baseY = nr.py;
  const FLOOR_R = 38;   // wide valley floor — easier to fly in
  const WALL_R  = 80;   // walls finish ramping at this radius
  let valleyY;
  if(d < FLOOR_R){
    valleyY = baseY - 1.2;
  } else if(d < WALL_R){
    const t = (d - FLOOR_R) / (WALL_R - FLOOR_R);
    const e = t*t*(3 - 2*t); // smoothstep
    valleyY = baseY - 1.2 + e * 70;     // fast, steep climb to wall height
  } else {
    valleyY = baseY - 1.2 + 70 + (d - WALL_R) * 1.4;
  }
  // noise — tiny on floor, big greebles on walls
  const wallMix = Math.min(1, Math.max(0, (d - FLOOR_R) / 50));
  const n = pnoise(x,z);
  return valleyY + n * (0.08 + 1.6 * wallMix);
}

// ─── ROAD SPLINE ─────────────────────────────────────────────
function buildRoadSpline(){
  // Trench-run geometry: long straight segments with occasional lazy
  // bends. The floor itself is nearly flat with tiny undulation.
  const pts=[];
  const N=800;
  let x=0, z=0;
  let hx=0; // heading
  for(let i=0;i<N;i++){
    hx += (hashFloat(i*3.7)-0.5)*0.18; // was 0.55 — much straighter now
    const step=110;
    x += Math.sin(hx)*step;
    z -= Math.cos(hx)*step;
    const y = 2.0 + Math.sin(i*0.11)*0.8; // mostly level floor
    pts.push(new THREE.Vector3(x,y,z));
  }
  const spline = new THREE.CatmullRomCurve3(pts,false,'catmullrom',0.2);
  return {pts, spline};
}

let roadObj;
function makeRoadTexture(){
  const w=64,h=512;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const g=cv.getContext('2d');
  g.fillStyle='#2a2a2a'; g.fillRect(0,0,w,h);
  // edge lines
  g.fillStyle='#cfcfa8'; g.fillRect(2,0,2,h); g.fillRect(w-4,0,2,h);
  // dashed centre
  g.fillStyle='#ffffff';
  for(let y=0;y<h;y+=42){ g.fillRect(w/2-1, y, 2, 22); }
  const t = new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(1,40);
  return t;
}

function buildRoad(spline){
  const segs = 3200;
  const halfW = 6.5;
  const positions=[], uvs=[], indices=[];
  const tmp = new THREE.Vector3(), up=new THREE.Vector3(0,1,0), binorm=new THREE.Vector3();
  const len = spline.getLength();
  for(let i=0;i<=segs;i++){
    const t = i/segs;
    const p = spline.getPointAt(t);
    const tang = spline.getTangentAt(t).normalize();
    binorm.crossVectors(up,tang).normalize();
    const pL = tmp.copy(p).addScaledVector(binorm, -halfW);
    positions.push(pL.x, pL.y+0.25, pL.z);
    const pR = tmp.copy(p).addScaledVector(binorm, halfW);
    positions.push(pR.x, pR.y+0.25, pR.z);
    uvs.push(0, t*40);
    uvs.push(1, t*40);
  }
  for(let i=0;i<segs;i++){
    const a=i*2,b=i*2+1,c=(i+1)*2,d=(i+1)*2+1;
    indices.push(a,c,b,  b,c,d);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({map:makeRoadTexture(), roughness:0.95, metalness:0.0});
  return new THREE.Mesh(geo, mat);
}

// provide distance-sq-to-road lookup (sampled polyline)
function sampleRoadPolyline(spline, n=900){
  const arr=[];
  for(let i=0;i<=n;i++){
    arr.push(spline.getPointAt(i/n));
  }
  return arr;
}
let ROADPTS=[];
function roadNearest(x,z){
  // Returns the nearest road polyline sample: {d2, px,py,pz, idx}
  if(ROADPTS.length===0) return {d2:1e9, px:0, py:0, pz:0, idx:0};
  let best=Infinity, bestI=0;
  for(let i=0;i<ROADPTS.length;i+=6){
    const p=ROADPTS[i]; const dx=p.x-x, dz=p.z-z; const d=dx*dx+dz*dz;
    if(d<best){best=d; bestI=i;}
  }
  const s=Math.max(0,bestI-6), e=Math.min(ROADPTS.length-1,bestI+6);
  for(let i=s;i<=e;i++){
    const p=ROADPTS[i]; const dx=p.x-x, dz=p.z-z; const d=dx*dx+dz*dz;
    if(d<best){best=d; bestI=i;}
  }
  const bp = ROADPTS[bestI];
  return {d2:best, px:bp.x, py:bp.y, pz:bp.z, idx:bestI};
}
function roadDistSq(x,z){ return roadNearest(x,z).d2; }

// ─── TERRAIN ─────────────────────────────────────────────────
let terrain;
function valleyY(baseY, d, x, z){
  const ad = Math.abs(d);
  const FLOOR_R=38, WALL_R=80;   // wider valley
  let y;
  if(ad<FLOOR_R) y = baseY - 1.2;
  else if(ad<WALL_R){ const tt=(ad-FLOOR_R)/(WALL_R-FLOOR_R); const e=tt*tt*(3-2*tt); y = baseY - 1.2 + e*70; }
  else y = baseY - 1.2 + 70 + (ad-WALL_R)*1.4;
  const wallMix = Math.min(1, Math.max(0, (ad-FLOOR_R)/50));
  return y + pnoise(x,z) * (0.08 + 1.6*wallMix);
}
function buildTerrain(){
  // Solid ribbon mesh extruded along the spline. Cartoon-style flat
  // colour fills (no shading, no wireframe) — easy to read at speed.
  const SLICES=360;
  // Cross-section anchors line up with the wider valley: floor inside
  // ±38 m, wall ramp out to ±80 m, then mountains beyond.
  const DS=[-700,-300,-180,-110,-80,-55,-38,0,38,55,80,110,180,300,700];
  const NC=DS.length;
  const positions=new Float32Array(SLICES*NC*3);
  const colors=new Float32Array(SLICES*NC*3);
  const up=new THREE.Vector3(0,1,0), bin=new THREE.Vector3();
  // Natural terrain: grass on the floor → dirt on the slope → rock on
  // the upper wall → snow at the rim. Subtle longitudinal biome shift
  // so the valley doesn't look perfectly uniform along its length.
  const naturalColor = (h, biome)=>{
    // h = height above road floor; biome = 0..1 mixes lush <-> arid
    let r,g,b;
    if(h < 1.5){                // grass floor
      r=0.22; g=0.52; b=0.20;
    } else if(h < 12){          // grass → dirt
      const t=(h-1.5)/10.5;
      r=0.22+t*0.28; g=0.52-t*0.18; b=0.20-t*0.05;
    } else if(h < 35){          // dirt → rock
      const t=(h-12)/23;
      r=0.50-t*0.05; g=0.34-t*0.02; b=0.15+t*0.25;
    } else if(h < 60){           // rock
      const t=(h-35)/25;
      r=0.45+t*0.12; g=0.43+t*0.13; b=0.40+t*0.15;
    } else {                    // snowy rim
      const t=Math.min(1,(h-60)/20);
      r=0.57+t*0.32; g=0.58+t*0.32; b=0.62+t*0.32;
    }
    // Biome shift: arid (1) pulls toward warmer browns; lush (0) keeps it green.
    r += biome * 0.10;
    g -= biome * 0.06;
    b -= biome * 0.04;
    return [r,g,b];
  };
  for(let i=0;i<SLICES;i++){
    const t = i/(SLICES-1);
    const p = spline.getPointAt(t);
    const tg = spline.getTangentAt(t).normalize();
    bin.crossVectors(up,tg).normalize();
    const baseY=p.y, sx=p.x, sz=p.z;
    // Slow biome wobble along the road
    const biome = 0.5 + 0.45*Math.sin(i*0.018);
    for(let j=0;j<NC;j++){
      const d=DS[j];
      const x = sx + bin.x*d;
      const z = sz + bin.z*d;
      const y = valleyY(baseY, d, x, z);
      const k=(i*NC+j)*3;
      positions[k]=x; positions[k+1]=y; positions[k+2]=z;
      const h = y - baseY;
      const ad = Math.abs(d);
      // Multi-scale noise gives the wall surface texture: small features
      // (rocks, cracks), medium patches (moss/sand) and broad shading.
      const n1 = pnoise(x*0.18, z*0.18);                  // fine detail
      const n2 = pnoise(x*0.04 + 13.7, z*0.04 - 21.3);    // patches
      const n3 = pnoise(x*0.012 + 71, z*0.012 + 9);       // broad zones
      // Base natural colour
      const c = naturalColor(h, biome);
      let r=c[0], g=c[1], b=c[2];
      // Fine speckle: brightens highlights and darkens cracks
      const speck = 0.85 + n1*0.30;
      r*=speck; g*=speck; b*=speck;
      // Patch tinting on walls only — moss/lichen on rock, sandy seams
      // on dirt, dark veins through stone. Floor stays clean grass.
      if(ad > 38){
        const wallStrength = Math.min(1, (ad-38)/40);
        // moss / lichen patches: slight green-cyan tint where n2 high
        if(n2 > 0.15 && h > 12 && h < 50){
          const t = Math.min(1, (n2-0.15)*2.5) * wallStrength * 0.55;
          r = r*(1-t) + 0.30*t;
          g = g*(1-t) + 0.55*t;
          b = b*(1-t) + 0.32*t;
        }
        // dark mineral veins: where n2 is low, tint toward charcoal
        if(n2 < -0.15){
          const t = Math.min(1, (-n2-0.15)*2.5) * wallStrength * 0.45;
          r = r*(1-t) + 0.18*t;
          g = g*(1-t) + 0.16*t;
          b = b*(1-t) + 0.20*t;
        }
        // sandy / clay seams in the lower wall band
        if(n3 > 0.20 && h < 25){
          const t = Math.min(1, (n3-0.20)*2.5) * wallStrength * 0.5;
          r = r*(1-t) + 0.62*t;
          g = g*(1-t) + 0.50*t;
          b = b*(1-t) + 0.30*t;
        }
        // snow drift extension into rock band where n3 is very high
        if(n3 > 0.30 && h > 38){
          const t = Math.min(1, (n3-0.30)*3.0) * wallStrength * 0.55;
          r = r*(1-t) + 0.92*t;
          g = g*(1-t) + 0.95*t;
          b = b*(1-t) + 0.99*t;
        }
      } else {
        // Floor: subtle grass/dirt mottling
        const t = (n2 + n1*0.4)*0.18;
        r += t*0.10; g += t*0.04; b -= t*0.02;
      }
      // Brightness: floor full, walls dim slightly so neon pops, with
      // a touch of dark ambient occlusion in crevasses.
      const dim = ad < 38 ? 1.00
                 : Math.max(0.55, 1.00 - (ad-38)*0.008);
      const ao = 0.85 + n1*0.10 + n2*0.05;
      const k2 = dim * ao;
      colors[k]=Math.max(0,Math.min(1,r*k2));
      colors[k+1]=Math.max(0,Math.min(1,g*k2));
      colors[k+2]=Math.max(0,Math.min(1,b*k2));
    }
  }
  // Solid triangulation between adjacent slices/samples. Vertex colours
  // carry the natural grass/dirt/rock/snow palette; MeshBasicMaterial
  // gives flat unshaded fills — exactly the cartoon look we want.
  const indices=[];
  for(let i=0;i<SLICES-1;i++){
    for(let j=0;j<NC-1;j++){
      const a=i*NC+j, b=i*NC+(j+1), c=(i+1)*NC+j, d=(i+1)*NC+(j+1);
      indices.push(a,c,b, b,c,d);
    }
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors,3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  const mat=new THREE.MeshBasicMaterial({vertexColors:true});
  return new THREE.Mesh(geo, mat);
}

// ─── TREES (InstancedMesh) ────────────────────────────────
let treesA, treesB;
let grassTufts; // InstancedMesh — purely decorative, no collision
function buildGrass(){
  // Tiny green cones scattered across the trench floor and lower slopes
  // for a "ground cover" feel. Uses InstancedMesh for performance.
  const N = 1600;
  const geo = new THREE.ConeGeometry(0.45, 1.4, 5);
  geo.translate(0, 0.7, 0);
  const mat = new THREE.MeshBasicMaterial({color:0x44a836});
  grassTufts = new THREE.InstancedMesh(geo, mat, N);
  grassTufts.frustumCulled = false;
  const m=new THREE.Matrix4(), q=new THREE.Quaternion(), s=new THREE.Vector3(), p=new THREE.Vector3();
  // alternate two greens for a bit of variety
  const greens = [new THREE.Color(0x55c044), new THREE.Color(0x3a8a2c), new THREE.Color(0x6cd258), new THREE.Color(0x488a3a)];
  let placed=0, tries=0;
  while(placed<N && tries<N*4){
    tries++;
    // sample position along the spline at random t
    const t = Math.random();
    const sp = spline.getPointAt(t);
    const tg = spline.getTangentAt(t).normalize();
    const bin = new THREE.Vector3(0,1,0).cross(tg).normalize();
    // lateral offset within floor + small slope band, both sides
    const side = Math.random()<0.5?-1:1;
    const lat  = (Math.random()*0.95) * 36 * side;     // -34..+34 across the floor
    const along = (Math.random()-0.5) * 50;            // jitter along tangent
    const x = sp.x + bin.x*lat + tg.x*along;
    const z = sp.z + bin.z*lat + tg.z*along;
    const y = groundY(x,z);
    // Skip tufts that landed on a steep wall slope
    const ad = Math.abs(lat);
    if(ad > 50) continue;
    const sc = 0.7 + Math.random()*1.5;
    p.set(x, y, z); s.set(sc, sc*(0.7+Math.random()*0.7), sc);
    q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.random()*Math.PI*2);
    m.compose(p,q,s);
    grassTufts.setMatrixAt(placed, m);
    grassTufts.setColorAt(placed, greens[(Math.random()*greens.length)|0]);
    placed++;
  }
  // hide leftover slots at the origin
  const hide = new THREE.Matrix4().makeScale(0,0,0);
  for(let i=placed;i<N;i++) grassTufts.setMatrixAt(i, hide);
  grassTufts.instanceMatrix.needsUpdate = true;
  if(grassTufts.instanceColor) grassTufts.instanceColor.needsUpdate = true;
  scene.add(grassTufts);
}
function buildTrees(){
  const trunkG=new THREE.CylinderGeometry(0.3,0.45,2.4,6);
  trunkG.translate(0,1.2,0);
  const foliageG=new THREE.ConeGeometry(2.2,5.5,7);
  foliageG.translate(0,4.3,0);
  const trunkM=new THREE.MeshStandardMaterial({color:0x553322, flatShading:true, roughness:1});
  const folM=new THREE.MeshStandardMaterial({color:0x2f6a34, flatShading:true, roughness:1});
  const N=400;
  treesA=new THREE.InstancedMesh(trunkG,trunkM,N);
  treesB=new THREE.InstancedMesh(foliageG,folM,N);
  treesA.frustumCulled=false; treesB.frustumCulled=false;
  const m=new THREE.Matrix4(), q=new THREE.Quaternion(), s=new THREE.Vector3(), p=new THREE.Vector3();
  let placed=0;
  // Bounded attempts — trench geometry leaves only a narrow rim where
  // trees fit. Sample along the spline instead of the whole plane, which
  // guarantees progress and avoids any possibility of an infinite loop.
  const MAX_TRIES = 40000;
  let tries=0;
  while(placed<N && tries<MAX_TRIES){
    tries++;
    // Sample a random t along the spline, then offset laterally by 20-28 m
    const t = Math.random();
    const sp = spline.getPointAt(t);
    const tg = spline.getTangentAt(t).normalize();
    const binorm = new THREE.Vector3(0,1,0).cross(tg).normalize();
    const side = Math.random() < 0.5 ? -1 : 1;
    const off = 20 + Math.random()*8;   // 20..28 m from road
    const jitter = (Math.random()-0.5)*4;
    const x = sp.x + binorm.x*side*off + tg.x*jitter;
    const z = sp.z + binorm.z*side*off + tg.z*jitter;
    const y = groundY(x,z);
    // skip if it landed on the floor (shouldn't) or beyond the wall top
    if(y < sp.y || y > sp.y + 55) continue;
    const sc=0.7+Math.random()*0.9;
    p.set(x,y,z); s.set(sc,sc,sc); q.setFromAxisAngle(new THREE.Vector3(0,1,0), Math.random()*Math.PI*2);
    m.compose(p,q,s);
    treesA.setMatrixAt(placed,m); treesB.setMatrixAt(placed,m);
    placed++;
  }
  // Hide any leftover instance slots
  const hideM = new THREE.Matrix4();
  hideM.makeScale(0,0,0);
  for(let i=placed;i<N;i++){
    treesA.setMatrixAt(i,hideM); treesB.setMatrixAt(i,hideM);
  }
  treesA.instanceMatrix.needsUpdate=true;
  treesB.instanceMatrix.needsUpdate=true;
  scene.add(treesA); scene.add(treesB);
}

// ─── OBSTACLES ────────────────────────────────────────────
const OBSTACLES=[]; // each {mesh, kind, pos, r, hitY}

function makePylonGeometry(){
  // lattice tower via thin boxes combined into one geometry via merge-less approach:
  // build as a Group and return as-is; we'll instance by duplicating the mesh.
  const g=new THREE.Group();
  const legMat=new THREE.MeshStandardMaterial({color:0x888888, roughness:0.8, metalness:0.3});
  const H=32;
  for(let i=0;i<4;i++){
    const a=i*Math.PI/2+Math.PI/4;
    const leg=new THREE.Mesh(new THREE.BoxGeometry(0.4, H, 0.4), legMat);
    leg.position.set(Math.cos(a)*2.4, H/2, Math.sin(a)*2.4);
    // taper by slight rotation (approximate)
    g.add(leg);
  }
  // horizontal braces at levels
  for(let h=4; h<H; h+=5){
    for(let i=0;i<4;i++){
      const a=i*Math.PI/2;
      const bx=new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 0.2), legMat);
      bx.position.set(Math.cos(a+Math.PI/4)*2.4*Math.cos(Math.PI/4)*0, h, 0);
      bx.rotation.y=a+Math.PI/4;
      bx.position.x = Math.cos(a)*0;
      // simpler: place along each side
      bx.position.set(0,h,0);
      bx.position.x = Math.cos(a)*2.4;
      bx.position.z = Math.sin(a)*2.4;
      bx.rotation.y = a+Math.PI/2;
      g.add(bx);
    }
    // cross bracing X
    for(let i=0;i<4;i++){
      const a=i*Math.PI/2;
      const dx=new THREE.Mesh(new THREE.BoxGeometry(6.2, 0.12, 0.12), legMat);
      dx.position.set(Math.cos(a)*2.4, h+2.5, Math.sin(a)*2.4);
      dx.rotation.y = a+Math.PI/2;
      dx.rotation.z = Math.PI/6;
      g.add(dx);
      const dx2 = dx.clone();
      dx2.rotation.z = -Math.PI/6;
      g.add(dx2);
    }
  }
  // cap + red light
  const cap=new THREE.Mesh(new THREE.BoxGeometry(6,0.5,6), legMat);
  cap.position.y=H+0.25;
  g.add(cap);
  const light=new THREE.Mesh(new THREE.SphereGeometry(0.55,8,8),
    new THREE.MeshBasicMaterial({color:0xff2222}));
  light.position.y=H+1.1;
  g.add(light);
  return {group:g, H:H+1.5};
}
const PYLON_PROTO = (function(){const p=makePylonGeometry(); return p;})();

function cloneGroup(src){
  const g=new THREE.Group();
  src.children.forEach(c=>{
    const n=new THREE.Mesh(c.geometry, c.material);
    n.position.copy(c.position);
    n.rotation.copy(c.rotation);
    n.scale.copy(c.scale);
    g.add(n);
  });
  return g;
}

function placePylon(p){
  const g=cloneGroup(PYLON_PROTO.group);
  g.position.set(p.x, groundY(p.x,p.z), p.z);
  scene.add(g);
  OBSTACLES.push({mesh:g, kind:'pylon', pos:new THREE.Vector3(p.x, g.position.y+PYLON_PROTO.H*0.5, p.z), r:4, hitTop:g.position.y+PYLON_PROTO.H, hitBot:g.position.y});
  return g;
}

function placeArch(p, tang){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x555566, roughness:0.9});
  const H=22, W=18;

  const c2=new THREE.Mesh(colGeo,mat); c2.position.set( W/2, H/2, 0); g.add(c2);
  const beam=new THREE.Mesh(new THREE.BoxGeometry(W+2, 2.2, 2.5), mat);
  beam.position.set(0, H+1, 0); g.add(beam);
  const sign=new THREE.Mesh(new THREE.BoxGeometry(10,2.5,0.3),

  sign.position.set(0, H+0.3, 0.8); g.add(sign);
  g.position.set(p.x, groundY(p.x,p.z), p.z);
  g.rotation.y = Math.atan2(tang.x, tang.z) + Math.PI/2;
  scene.add(g);
  OBSTACLES.push({mesh:g, kind:'arch', pos:new THREE.Vector3(p.x, g.position.y+H*0.6, p.z), r:12, hitTop:g.position.y+H+2.2, hitBot:g.position.y});
  return g;
}

function placeBuilding(p){
  const g=new THREE.Group();
  const sz=4+Math.random()*6, h=6+Math.random()*10;
  const mat=new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.08+Math.random()*0.08,0.35,0.35+Math.random()*0.15), flatShading:true, roughness:0.95});
  const body=new THREE.Mesh(new THREE.BoxGeometry(sz, h, sz), mat);
  body.position.y=h/2;
  g.add(body);
  // roof
  const roof=new THREE.Mesh(new THREE.ConeGeometry(sz*0.75, 3, 4),
    new THREE.MeshStandardMaterial({color:0x552222, flatShading:true}));
  roof.position.y=h+1.5; roof.rotation.y=Math.PI/4;
  g.add(roof);
  g.position.set(p.x, groundY(p.x,p.z), p.z);
  g.rotation.y=Math.random()*Math.PI;
  scene.add(g);
  OBSTACLES.push({mesh:g, kind:'bldg', pos:new THREE.Vector3(p.x, g.position.y+h/2, p.z), r:sz*0.8, hitTop:g.position.y+h+3, hitBot:g.position.y});
  return g;
}

function placeCable(a,b){
  const dx=b.x-a.x, dy=b.y-a.y, dz=b.z-a.z;
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
  const geo=new THREE.CylinderGeometry(0.14,0.14,len,5);
  const mat=new THREE.MeshStandardMaterial({color:0x222222});
  const m=new THREE.Mesh(geo,mat);
  m.position.set((a.x+b.x)/2,(a.y+b.y)/2,(a.z+b.z)/2);
  m.lookAt(b);
  m.rotateX(Math.PI/2);
  scene.add(m);
  OBSTACLES.push({mesh:m, kind:'cable', pos:m.position.clone(), r:1.0, a:a.clone(), b:b.clone()});
  return m;
}

function placeBalloon(p){
  const g=new THREE.Group();
  const body=new THREE.Mesh(new THREE.SphereGeometry(3.2,14,12),
    new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),0.7,0.55), flatShading:true}));
  body.position.y=0;
  const basket=new THREE.Mesh(new THREE.BoxGeometry(1.6,1.2,1.6),
    new THREE.MeshStandardMaterial({color:0x664422, flatShading:true}));
  basket.position.y=-4;
  g.add(body); g.add(basket);
  // ropes (just a thin cylinder)
  const rope=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,3.4,4),
    new THREE.MeshBasicMaterial({color:0x221100}));
  rope.position.y=-2;
  g.add(rope);
  g.position.set(p.x, p.y, p.z);
  g.userData.drift = (Math.random()-0.5)*0.05;
  g.userData.bobPhase = Math.random()*Math.PI*2;
  scene.add(g);
  OBSTACLES.push({mesh:g, kind:'balloon', pos:g.position, r:3.6, hitTop:0, hitBot:0});
  return g;
}

// Pickup: a glowing green ring the pilot flies through to restore life.
function placePickup(worldX, worldY, worldZ, tang){
  const g=new THREE.Group();
  const torusGeo=new THREE.TorusGeometry(2.2, 0.35, 10, 28);
  const torusMat=new THREE.MeshStandardMaterial({color:0x33ff88, emissive:0x22ff77, emissiveIntensity:1.4, roughness:0.4});
  const ring=new THREE.Mesh(torusGeo, torusMat);
  g.add(ring);
  // additive halo sprite
  if(!EXPL_TEX){ EXPL_TEX=makeFireballTexture(); SMOKE_TEX=makeSmokeTexture(); }
  const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:EXPL_TEX, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, color:0x66ffaa}));
  halo.scale.set(6,6,6);
  g.add(halo);
  g.position.set(worldX, worldY, worldZ);
  // orient ring so its axis lies along road tangent — you fly THROUGH it
  g.rotation.y = Math.atan2(tang.x, tang.z);
  scene.add(g);
  OBSTACLES.push({mesh:g, kind:'pickup', pos:new THREE.Vector3(worldX, worldY, worldZ), r:3.4,
    phase:Math.random()*Math.PI*2, ring:ring, halo:halo, collected:false});
  return g;
}

// Jagged rock outcrop jutting from the wall — purely a hazard, no firing.
function placeRock(worldX, worldY, worldZ, scale){
  const g=new THREE.Group();
  const rocks = 3 + Math.floor(Math.random()*4);
  let topY=0, botY=0;
  for(let i=0;i<rocks;i++){
    const sz = scale * (0.65 + Math.random()*0.9);
    const r = new THREE.Mesh(
      new THREE.OctahedronGeometry(sz, 0),
      new THREE.MeshBasicMaterial({color: 0x4a3a2a})
    );
    const lx = (Math.random()-0.5)*scale*1.6;
    const ly = (Math.random()-0.5)*scale*0.7;
    const lz = (Math.random()-0.5)*scale*1.6;
    r.position.set(lx, ly, lz);
    r.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    g.add(r);
    topY = Math.max(topY, ly + sz);
    botY = Math.min(botY, ly - sz);
  }
  g.position.set(worldX, worldY, worldZ);
  scene.add(g);
  OBSTACLES.push({mesh:g, kind:'rock',
    pos:new THREE.Vector3(worldX, worldY, worldZ),
    r: scale*1.6,
    hitTop: worldY + topY + 1,
    hitBot: worldY + botY - 1});
  return g;
}

function placeTurret(worldX, worldY, worldZ, tang, side){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:0x333840, roughness:0.7, metalness:0.3});
  const base=new THREE.Mesh(new THREE.CylinderGeometry(1.4,1.4,1.6,12), mat);
  base.position.y=0.8;
  g.add(base);
  const barrel=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.35,3.2), mat);
  barrel.position.set(0,1.3,-1.6); // barrel points along local -Z (inward toward road)
  g.add(barrel);
  const light=new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8),
    new THREE.MeshBasicMaterial({color:0xff2222}));
  light.position.set(0,1.9,0);
  g.add(light);
  g.position.set(worldX, worldY, worldZ);
  // face inward toward road centre: tang gives road direction; binormal = up×tang points from road to +side.
  // We want barrel (-Z locally) to point toward road, i.e. opposite side. Yaw accordingly.
  // If side=+1 (placed on +binormal side), road is at -binormal direction. Barrel -Z should match that.
  const bx=-tang.z*side, bz=tang.x*side; // binormal components scaled by side (from road→turret)
  // inward direction (turret→road) = (-bx,-bz). Aim local -Z there.
  g.rotation.y = Math.atan2(-bx, -bz);
  scene.add(g);
  // compute barrel world position
  const barrelLocal=new THREE.Vector3(0,1.3,-1.6);
  const barrelWorld=barrelLocal.clone().applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0,g.rotation.y,0))).add(g.position);
  OBSTACLES.push({mesh:g, kind:'turret', pos:new THREE.Vector3(worldX, worldY+1, worldZ), r:1.6,
    hitTop:worldY+3, hitBot:worldY-0.5, side, barrelBase:barrelWorld,
    cooldown:1.8+Math.random()*1.4, active:true});
  return g;
}

function populateObstacles(spline){
  const diff = STATE.diff;
  // Arcade overhaul: noticeably more stuff to weave through at every difficulty
  const baseMul = diff==='recon'?0.9 : diff==='hot'?2.4 : 1.5;
  // Each level scales the obstacle density by 1.25^(level-1) so things
  // feel measurably tougher each clear.
  const densityMul = baseMul * Math.pow(1.25, STATE.level-1);
  const len = spline.getLength();
  // pylons — pairs so cables can span them
  let prevPylon=null;
  const pylonStep = 140/densityMul;
  for(let d=120; d<len-80; d+=pylonStep + Math.random()*40){
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t);
    const nx=-tang.z, nz=tang.x;
    // pick side
    const side = (Math.random()<0.5?-1:1);
    // Two valid bands: on the wide floor (<32), or up on the plateau (>90).
    // Avoid the 32..90 wall slope where things would float/sink.
    const off = (Math.random()<0.5) ? (12+Math.random()*18) : (95+Math.random()*22);
    const pt={x:p.x+nx*off*side, z:p.z+nz*off*side};
    const py=placePylon(pt);
    const pylonTop=new THREE.Vector3(pt.x, groundY(pt.x,pt.z)+PYLON_PROTO.H-2, pt.z);
    // place a partner pylon on the opposite side sometimes, with a cable spanning
    if(Math.random()<0.5){
      const pt2={x:p.x-nx*off, z:p.z-nz*off};
      placePylon(pt2);
      const pylonTop2=new THREE.Vector3(pt2.x, groundY(pt2.x,pt2.z)+PYLON_PROTO.H-2, pt2.z);
      placeCable(pylonTop, pylonTop2);
    } else if(prevPylon && Math.random()<0.55){
      placeCable(pylonTop, prevPylon);
    }
    prevPylon = pylonTop;
  }
  // turrets — placed thickly along both wall rims, often on BOTH sides
  // at the same point so the player gets crossfire.
  const turretStep = 110/densityMul;
  for(let d=160; d<len-80; d+=turretStep + Math.random()*40){
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t).normalize();
    const bx=-tang.z, bz=tang.x;
    const off = 82 + Math.random()*20; // just inside the plateau, closer than before
    // place on one side always; ~40% of the time on both sides for crossfire
    const sides = Math.random()<0.4 ? [-1,+1] : [Math.random()<0.5?-1:1];
    for(const s of sides){
      const wx=p.x+bx*s*off, wz=p.z+bz*s*off;
      const wy=groundY(wx,wz);
      placeTurret(wx, wy, wz, tang, s);
    }
  }
  // jagged rock outcrops jutting from the wall slope — stay clear or
  // you scrape them and lose health. Dense placement: every ~32 m on
  // average, often in clusters on both sides at once.
  const rockStep = 32/densityMul;
  for(let d=80; d<len-80; d+=rockStep + Math.random()*22){
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t).normalize();
    const bx=-tang.z, bz=tang.x;
    // either side, with a 45% chance of both sides (denser hazard)
    const sides = Math.random()<0.45 ? [-1,+1] : [Math.random()<0.5?-1:1];
    for(const s of sides){
      const off = 40 + Math.random()*38;     // 40..78 — slope band
      const wx=p.x+bx*s*off, wz=p.z+bz*s*off;
      const wy=groundY(wx,wz) + 1.5;
      placeRock(wx, wy, wz, 2.2 + Math.random()*3.2);
    }
  }
  // arches
  const archStep = 380/densityMul;
  for(let d=220; d<len-80; d+=archStep + Math.random()*80){
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t);
    placeArch(p,tang);
  }
  // buildings alongside
  const bldgStep = 70/densityMul;
  for(let d=80; d<len-60; d+=bldgStep + Math.random()*40){
    if(Math.random()>0.45) continue;
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t);
    const nx=-tang.z, nz=tang.x;
    const side=Math.random()<0.5?-1:1;
    const off=18+Math.random()*15; // 18..33 — hug the wider trench floor against the wall base
    placeBuilding({x:p.x+nx*off*side, z:p.z+nz*off*side});
  }
  // balloons — floating at varied altitudes
  const balStep = 260/densityMul;
  for(let d=150; d<len-60; d+=balStep + Math.random()*60){
    if(Math.random()>0.7) continue;
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t);
    const nx=-tang.z, nz=tang.x;
    const side=Math.random()<0.5?-1:1;
    const off=8+Math.random()*30;
    const x=p.x+nx*off*side, z=p.z+nz*off*side;
    const y=groundY(x,z)+15+Math.random()*22;
    placeBalloon({x,y,z});
  }
  // life pickups — bright green rings on the flight path
  const pickStep = 320;
  for(let d=180; d<len-60; d+=pickStep + Math.random()*140){
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t).normalize();
    const nx=-tang.z, nz=tang.x;
    const side=Math.random()<0.5?-1:1;
    const lat=(Math.random()*0.8)*side*6;
    const x=p.x + nx*lat;
    const z=p.z + nz*lat;
    const y=p.y + 10 + Math.random()*18;
    placePickup(x,y,z, tang);
  }
  // gold prizes — sit on the valley floor with a vertical beacon
  const prizeStep = 700;
  for(let d=420; d<len-60; d+=prizeStep + Math.random()*250){
    const t=d/len;
    const p=spline.getPointAt(t);
    const tang=spline.getTangentAt(t).normalize();
    const nx=-tang.z, nz=tang.x;
    const lat=(Math.random()-0.5)*8;       // tiny wobble around centre
    const x=p.x + nx*lat;
    const z=p.z + nz*lat;
    const y=groundY(x,z) + 3.0;            // hovering just above the floor
    placePrize(x,y,z);
  }
}

// ─── HELICOPTER (for cockpit view we still build one for rotor/tail visuals) ─
let heli, mainRotor, tailRotor;
function buildHeli(){
  const g=new THREE.Group();
  // main rotor disk — slightly forward & above camera so it's visible in cockpit
  const diskGeo=new THREE.RingGeometry(3.2, 4.6, 32);
  diskGeo.rotateX(-Math.PI/2);
  const diskMat=new THREE.MeshBasicMaterial({color:0x111111, transparent:true, opacity:0.28, side:THREE.DoubleSide, depthWrite:false});
  mainRotor=new THREE.Mesh(diskGeo, diskMat);
  mainRotor.position.set(0, 1.8, 0.2);
  g.add(mainRotor);
  // rotor hub + two blades (slightly visible through disk)
  const hub=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,0.3,10), new THREE.MeshStandardMaterial({color:0x222222}));
  hub.position.set(0,1.8,0.2);
  g.add(hub);
  const bladeGeo=new THREE.BoxGeometry(9.0,0.08,0.35);
  const bladeMat=new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.35});
  const b1=new THREE.Mesh(bladeGeo,bladeMat); b1.position.copy(hub.position); g.add(b1);
  const b2=new THREE.Mesh(bladeGeo,bladeMat); b2.position.copy(hub.position); b2.rotation.y=Math.PI/2; g.add(b2);
  mainRotor.userData.blades=[b1,b2];
  // tail rotor (visible if player looks far right) — we put it behind/right
  const tailDisk=new THREE.Mesh(
    new THREE.RingGeometry(0.9,1.3, 16),
    new THREE.MeshBasicMaterial({color:0x000000, transparent:true, opacity:0.35, side:THREE.DoubleSide})
  );
  tailDisk.position.set(1.6, 0.9, -4.5);
  tailDisk.rotation.z=Math.PI/2;
  g.add(tailDisk);
  tailRotor=tailDisk;
  // Arcade cockpit: hide rotor visuals so the player sees only the world.
  mainRotor.visible=false;
  tailRotor.visible=false;
  if(mainRotor.userData.blades){ mainRotor.userData.blades.forEach(b=>b.visible=false); }
  heli=g;
  scene.add(g);
}

function resetHeli(){
  // find a start position a bit before the spline start, aimed along the spline
  if(roadObj && spline){
    const p = spline.getPointAt(0.002);
    const t = spline.getTangentAt(0.002).normalize();
    H.pos.set(p.x, p.y+35, p.z);

// ─── UNIFIED ON-SCREEN STICK ─────────────────────────────────
// One visible stick, dragged with finger or mouse. Same input for
// touch and desktop. Keyboard still works as a secondary input.
const STICK={ x:0, y:0, active:false, id:-1 };
const KEYS={};
const TOUCH={ boost:false, fire:false };
const STICK_RANGE = 52; // px travel from centre
const stickBaseEl = document.getElementById('stickBase');
const stickKnobEl = document.getElementById('stickKnob');

function updateStickFromPointer(e){
  const r = stickBaseEl.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top  + r.height/2;
  let dx = e.clientX - cx, dy = e.clientY - cy;
  const m = Math.hypot(dx,dy);
  if(m > STICK_RANGE){ const s = STICK_RANGE/m; dx *= s; dy *= s; }
  STICK.x = dx / STICK_RANGE;
  STICK.y = dy / STICK_RANGE;
  stickKnobEl.style.transform = 'translate('+dx+'px,'+dy+'px)';
}
function releaseStick(){
  STICK.active=false; STICK.id=-1;
  STICK.x=0; STICK.y=0;
  stickKnobEl.style.transform = 'translate(0px,0px)';
}
stickBaseEl.addEventListener('pointerdown', e=>{
  if(!STATE.started||STATE.over) return;
  e.preventDefault(); e.stopPropagation();
  STICK.active=true; STICK.id=e.pointerId;
  try{ stickBaseEl.setPointerCapture(e.pointerId); }catch(_){}
  updateStickFromPointer(e);
}, {passive:false});
stickBaseEl.addEventListener('pointermove', e=>{
  if(!STICK.active || e.pointerId!==STICK.id) return;
  e.preventDefault(); e.stopPropagation();
  updateStickFromPointer(e);
}, {passive:false});
['pointerup','pointercancel','pointerleave'].forEach(ev=>{
  stickBaseEl.addEventListener(ev, e=>{
    if(e.pointerId!==STICK.id) return;
    try{ stickBaseEl.releasePointerCapture(e.pointerId); }catch(_){}
    releaseStick();
  });
});

window.addEventListener('keydown', e=>{
  KEYS[e.code]=true;
  if(e.code==='Space'){e.preventDefault();}
},{passive:false});
window.addEventListener('keyup',   e=>{KEYS[e.code]=false;});

// ─── EXPLOSIONS ────────────────────────────────────────────
// Billboard fireball + smoke + debris. Particles are recycled.
let EXPL_TEX=null, SMOKE_TEX=null;
function makeFireballTexture(){
  const s=128, cv=document.createElement('canvas'); cv.width=s; cv.height=s;
  const g=cv.getContext('2d');
  const grd=g.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
  grd.addColorStop(0.0, 'rgba(255,255,220,1)');
  grd.addColorStop(0.25,'rgba(255,210,80,1)');
  grd.addColorStop(0.55,'rgba(255,100,30,0.8)');
  grd.addColorStop(0.85,'rgba(160,40,10,0.2)');
  grd.addColorStop(1.0, 'rgba(0,0,0,0)');
  g.fillStyle=grd; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(cv); t.needsUpdate=true; return t;
}
function makeSmokeTexture(){
  const s=128, cv=document.createElement('canvas'); cv.width=s; cv.height=s;
  const g=cv.getContext('2d');
  const grd=g.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
  grd.addColorStop(0.0, 'rgba(60,60,60,0.9)');
  grd.addColorStop(0.5, 'rgba(40,40,40,0.55)');
  grd.addColorStop(1.0, 'rgba(0,0,0,0)');
  g.fillStyle=grd; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(cv); t.needsUpdate=true; return t;
}
const PARTICLES=[]; // {sprite, vel, life, maxLife, scaleRate, kind}
function spawnFireball(pos, size, life, vel){
  const mat=new THREE.SpriteMaterial({map:EXPL_TEX, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(size,size,size);
  sp.position.copy(pos);
  scene.add(sp);
  PARTICLES.push({sprite:sp, vel:vel.clone(), life:life, maxLife:life, scaleRate:size*3.0, kind:'fire'});
}
function spawnSmoke(pos, size, life, vel){
  const mat=new THREE.SpriteMaterial({map:SMOKE_TEX, transparent:true, depthWrite:false, color:0x444444});
  const sp=new THREE.Sprite(mat);
  sp.scale.set(size,size,size);
  sp.position.copy(pos);
  scene.add(sp);
  PARTICLES.push({sprite:sp, vel:vel.clone(), life:life, maxLife:life, scaleRate:size*0.9, kind:'smoke'});
}
function spawnDebris(pos, vel){
  const geo=new THREE.BoxGeometry(0.7,0.3,0.7);
  const mat=new THREE.MeshBasicMaterial({color:0x222222});
  const m=new THREE.Mesh(geo,mat);
  m.position.copy(pos);
  scene.add(m);
  PARTICLES.push({sprite:m, vel:vel.clone(), life:2.4, maxLife:2.4, scaleRate:0, kind:'debris',
    spin:new THREE.Vector3((Math.random()-0.5)*10,(Math.random()-0.5)*10,(Math.random()-0.5)*10)});
}
function explosionBurst(pos, scale){
  if(!EXPL_TEX){ EXPL_TEX=makeFireballTexture(); SMOKE_TEX=makeSmokeTexture(); }
  scale = scale || 1;
  // core fireball
  spawnFireball(pos, 10*scale, 0.7, new THREE.Vector3(0,2*scale,0));
  // secondary flashes
  for(let i=0;i<6;i++){
    const dir=new THREE.Vector3((Math.random()-0.5)*2, Math.random()*1.5, (Math.random()-0.5)*2);
    dir.normalize().multiplyScalar((4+Math.random()*6)*scale);
    spawnFireball(pos, (3+Math.random()*3)*scale, 0.5+Math.random()*0.4, dir);
  }
  // smoke plumes
  for(let i=0;i<5;i++){
    const dir=new THREE.Vector3((Math.random()-0.5)*1.5, 1+Math.random()*1.5, (Math.random()-0.5)*1.5);
    dir.multiplyScalar(2*scale);
    spawnSmoke(pos, (5+Math.random()*4)*scale, 1.8+Math.random()*1.2, dir);
  }
  // debris
  for(let i=0;i<10;i++){
    const dir=new THREE.Vector3((Math.random()-0.5)*2, 0.8+Math.random()*1.4, (Math.random()-0.5)*2);
    dir.multiplyScalar((8+Math.random()*10)*scale);
    spawnDebris(pos, dir);
  }
}
// ─── MISSILES ─────────────────────────────────────────────
const MISSILES=[];
function spawnMissile(fromPos, targetPos){
  const dir=new THREE.Vector3().subVectors(targetPos, fromPos);
  // lead the target by 1 s of heli velocity
  const lead=H.vel.clone().multiplyScalar(1.0);
  dir.add(lead).normalize();
  const vel=dir.multiplyScalar(72 * Math.min(1.6, 1 + (STATE.level-1)*0.08));
  const geo=new THREE.CylinderGeometry(0.25,0.25,1.2,8);
  geo.rotateX(Math.PI/2); // align to local -Z
  const mat=new THREE.MeshBasicMaterial({color:0xff5a3a});
  const m=new THREE.Mesh(geo, mat);
  m.position.copy(fromPos);
  scene.add(m);
  if(!EXPL_TEX){ EXPL_TEX=makeFireballTexture(); SMOKE_TEX=makeSmokeTexture(); }
  const tmat=new THREE.SpriteMaterial({map:EXPL_TEX, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, color:0xff8844});
  const trail=new THREE.Sprite(tmat);
  trail.scale.set(1.4,1.4,1.4);
  trail.position.copy(fromPos);
  scene.add(trail);
  MISSILES.push({mesh:m, trail:trail, vel:vel, life:3.5, maxLife:3.5});
}
function tickMissiles(dt){
  for(let i=MISSILES.length-1;i>=0;i--){
    const mi=MISSILES[i];
    mi.life -= dt;
    mi.mesh.position.addScaledVector(mi.vel, dt);
    // orient along velocity (local -Z → vel direction)
    const look=mi.mesh.position.clone().add(mi.vel);
    mi.mesh.lookAt(look);
    mi.trail.position.copy(mi.mesh.position);
    // player hit
    const dx=mi.mesh.position.x-H.pos.x, dy=mi.mesh.position.y-H.pos.y, dz=mi.mesh.position.z-H.pos.z;
    const dist2=dx*dx+dy*dy+dz*dz;
    let dead=false;
    if(dist2 < 2.5*2.5 && H.invuln<=0 && H.alive){
      damageShield('MISSILE');
      explosionBurst(mi.mesh.position.clone(), 0.35);
      dead=true;
    } else if(mi.life<=0){
      explosionBurst(mi.mesh.position.clone(), 0.2);
      dead=true;
    } else {
      const gy=groundY(mi.mesh.position.x, mi.mesh.position.z);
      if(mi.mesh.position.y < gy + 0.5){
        explosionBurst(mi.mesh.position.clone(), 0.25);
        dead=true;
      }
    }
    if(dead){
      scene.remove(mi.mesh); scene.remove(mi.trail);
      if(mi.mesh.geometry) mi.mesh.geometry.dispose();
      if(mi.mesh.material) mi.mesh.material.dispose();
      if(mi.trail.material) mi.trail.material.dispose();
      MISSILES.splice(i,1);
    }
  }
}

// ─── ENEMY BANDITS ────────────────────────────────────────
// Small angular drone-jets that spawn ahead of the heli, accelerate
// toward it, and try to ram it. Two bullet hits destroys one.
const ENEMIES=[];
let nextEnemyT = 6;
function spawnEnemy(){
  const g=new THREE.Group();
  // pointed body
  const body=new THREE.Mesh(
    new THREE.ConeGeometry(1.0, 4.2, 6),
    new THREE.MeshBasicMaterial({color:0x3a1018})
  );
  body.rotation.x = -Math.PI/2; // point along -Z (local forward)
  g.add(body);
  // swept wings
  const wings=new THREE.Mesh(
    new THREE.BoxGeometry(5.5, 0.3, 1.2),
    new THREE.MeshBasicMaterial({color:0x550022})
  );
  wings.position.z = 0.4;
  g.add(wings);
  // glowing red eye / cockpit
  const eye=new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 8, 6),
    new THREE.MeshBasicMaterial({color:0xff2233})
  );
  eye.position.z = -1.6;
  g.add(eye);
  // tail fin
  const tail=new THREE.Mesh(
    new THREE.BoxGeometry(0.25, 1.2, 0.9),
    new THREE.MeshBasicMaterial({color:0x550022})
  );
  tail.position.set(0, 0.6, 1.6);
  g.add(tail);

  // Spawn ahead of the player, slightly off to one side and at a random
  // altitude within the trench corridor.
  const fwd  = new THREE.Vector3(0,0,-1).applyQuaternion(H.quat);
  const right= new THREE.Vector3(1,0,0).applyQuaternion(H.quat);
  const spawnDist = 280 + Math.random()*180;
  const sideOff   = (Math.random()-0.5) * 36;
  const upOff     = (Math.random()-0.5) * 22;
  const pos = H.pos.clone()
    .addScaledVector(fwd,   spawnDist)
    .addScaledVector(right, sideOff);
  pos.y += upOff;
  g.position.copy(pos);
  scene.add(g);
  ENEMIES.push({mesh:g, pos:g.position, vel:new THREE.Vector3(0,0,0), hp:2});
}
function tickEnemies(dt){
  // Spawn schedule — more often as the level rises.
  nextEnemyT -= dt;
  if(nextEnemyT<=0 && H.alive && !STATE.over){
    if(ENEMIES.length < 5 + STATE.level) spawnEnemy();
    const interval = Math.max(2.5, 7 - STATE.level*0.4);
    nextEnemyT = interval + Math.random()*2.5;
  }
  for(let i=ENEMIES.length-1;i>=0;i--){
    const e = ENEMIES[i];
    // Steer toward player with a smooth acceleration.
    const dir = new THREE.Vector3().subVectors(H.pos, e.pos).normalize();
    const speed = 32 + STATE.level*3;
    const targetVel = dir.multiplyScalar(speed);
    e.vel.lerp(targetVel, Math.min(1, dt*1.5));
    e.pos.addScaledVector(e.vel, dt);
    // Orient mesh along motion so the cone points where it's flying.
    if(e.vel.lengthSq() > 0.01){
      const look = e.pos.clone().add(e.vel);
      e.mesh.lookAt(look);
    }
    // Ram the player?
    const dx=H.pos.x-e.pos.x, dy=H.pos.y-e.pos.y, dz=H.pos.z-e.pos.z;
    if(dx*dx+dy*dy+dz*dz < 4.0*4.0 && H.invuln<=0 && H.alive){
      damageLife('ENEMY');
      explosionBurst(e.pos.clone(), 0.9);
      scene.remove(e.mesh);
      ENEMIES.splice(i,1);
      continue;
    }
    // Despawn if it falls way behind the player (shouldn't, but safety).
    if(H.pos.distanceTo(e.pos) > 900){
      scene.remove(e.mesh);
      ENEMIES.splice(i,1);
    }
  }
}

// ─── BULLETS (helicopter nose gun) ─────────────────────────
const BULLETS=[];
let GUN_COOLDOWN = 0;     // seconds until next shot allowed
let GUN_HEAT = 0;         // 0..1 — fills while firing, drops while idle
let GUN_LOCKOUT = 0;      // seconds remaining of forced-cool lockout
const GUN_RATE = 0.045;   // ~22 rps — proper machine-gun cadence
const HEAT_BURN_TIME = 10; // seconds of continuous fire to overheat
const HEAT_COOL_TIME = 3;  // seconds of forced cooldown when overheated
let GUN_BARREL = 0;     // alternate between two muzzles
function spawnBullet(){
  // Spawn from one of two muzzles a bit ahead of the cockpit. A small
  // random spread plus a slight aim wobble give a chunky, tracer-like
  // machine-gun feel.
  const fwd  = new THREE.Vector3(0,0,-1).applyQuaternion(H.quat);
  const right= new THREE.Vector3(1,0,0).applyQuaternion(H.quat);
  const upV  = new THREE.Vector3(0,1,0).applyQuaternion(H.quat);
  GUN_BARREL ^= 1;
  const muzzleX = (GUN_BARREL ? 1 : -1) * 0.9;
  const origin = H.pos.clone()
    .addScaledVector(fwd,   2.5)
    .addScaledVector(right, muzzleX)
    .addScaledVector(upV,  -0.25);
  // Spread: small random angle off forward (radians)
  const spread = 0.018;
  const sx = (Math.random()-0.5)*spread;
  const sy = (Math.random()-0.5)*spread;
  const dir = fwd.clone()
    .addScaledVector(right, sx)
    .addScaledVector(upV,   sy)
    .normalize();
  const vel = dir.multiplyScalar(280).add(H.vel);
  const geo = new THREE.CylinderGeometry(0.18,0.18,2.4,6);
  geo.rotateX(Math.PI/2);
  // Tracers alternate yellow / orange so the stream reads as fast & gritty.
  const col = (GUN_BARREL ? 0xffee44 : 0xffaa22);
  const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:col}));
  m.position.copy(origin);
  scene.add(m);
  BULLETS.push({mesh:m, vel:vel, life:1.0});
  // Quick percussive bark — short, punchy, low-pitched.
  if(AC && masterGain){
    const t = AC.currentTime;
    const o = AC.createOscillator(); const g = AC.createGain();
    o.type='square';
    o.frequency.setValueAtTime(420 + Math.random()*60, t);
    o.frequency.exponentialRampToValueAtTime(90, t+0.04);
    g.gain.setValueAtTime(0.10, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    o.connect(g); g.connect(masterGain); o.start(); o.stop(t+0.06);
  }
}
function tickBullets(dt){
  GUN_COOLDOWN -= dt;
  const wantFire = (TOUCH.fire || KEYS['KeyF'] || KEYS['KeyJ']) && H.alive && !STATE.over;
  // Heat / overheat lockout — 10 s continuous fire forces 3 s cooldown.
  if(GUN_LOCKOUT > 0){
    GUN_LOCKOUT -= dt;
    GUN_HEAT = Math.max(0, GUN_HEAT - dt/HEAT_COOL_TIME);
    document.getElementById('fireBtn').classList.add('cooling');
  } else if(wantFire){
    GUN_HEAT += dt / HEAT_BURN_TIME;
    if(GUN_HEAT >= 1){
      GUN_HEAT = 1;
      GUN_LOCKOUT = HEAT_COOL_TIME;
      // overheat klaxon
      if(AC && masterGain){
        const t=AC.currentTime;
        const o=AC.createOscillator(); const g=AC.createGain();
        o.type='square'; o.frequency.setValueAtTime(220, t);
        o.frequency.linearRampToValueAtTime(110, t+0.45);
        g.gain.setValueAtTime(0.18, t);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(t+0.52);
      }
    }
  } else {
    GUN_HEAT = Math.max(0, GUN_HEAT - dt/HEAT_COOL_TIME);
    document.getElementById('fireBtn').classList.remove('cooling');
  }
  // Actual fire: only if not in forced cooldown.
  const firing = wantFire && GUN_LOCKOUT<=0;
  if(firing && GUN_COOLDOWN<=0){
    spawnBullet();
    GUN_COOLDOWN = GUN_RATE;
  }
  for(let i=BULLETS.length-1;i>=0;i--){
    const b=BULLETS[i];
    b.life -= dt;
    b.mesh.position.addScaledVector(b.vel, dt);
    // orient along velocity
    const look=b.mesh.position.clone().add(b.vel);
    b.mesh.lookAt(look);
    let dead = b.life<=0;
    // vs missiles
    if(!dead){
      for(let j=MISSILES.length-1;j>=0;j--){
        const mi=MISSILES[j];
        const dx=b.mesh.position.x-mi.mesh.position.x;
        const dy=b.mesh.position.y-mi.mesh.position.y;
        const dz=b.mesh.position.z-mi.mesh.position.z;
        if(dx*dx+dy*dy+dz*dz < 2.0*2.0){
          explosionBurst(mi.mesh.position.clone(), 0.35);
          scene.remove(mi.mesh); scene.remove(mi.trail);
          if(mi.mesh.geometry) mi.mesh.geometry.dispose();
          if(mi.mesh.material) mi.mesh.material.dispose();
          if(mi.trail.material) mi.trail.material.dispose();
          MISSILES.splice(j,1);
          dead=true;
          break;
        }
      }
    }
    // vs enemy bandits
    if(!dead){
      for(let j=ENEMIES.length-1;j>=0;j--){
        const e=ENEMIES[j];
        const dx=b.mesh.position.x-e.pos.x;
        const dy=b.mesh.position.y-e.pos.y;
        const dz=b.mesh.position.z-e.pos.z;
        if(dx*dx+dy*dy+dz*dz < 3.5*3.5){
          e.hp -= 1;
          if(e.hp<=0){
            explosionBurst(e.pos.clone(), 0.9);
            scene.remove(e.mesh);
            ENEMIES.splice(j,1);
          } else {
            explosionBurst(b.mesh.position.clone(), 0.25);
          }
          dead=true;
          break;
        }
      }
    }
    // vs destructible obstacles — turret, balloon, pylon, arch, bldg, cable.
    // Pylons/arches/buildings take multiple hits (tracked on o.hp).
    // Tall obstacles use cylinder collision (XZ distance + Y range) so
    // any bullet passing near the column counts, not just one through
    // the precise centre.
    if(!dead){
      for(let j=OBSTACLES.length-1;j>=0;j--){
        const o=OBSTACLES[j];
        if(o.kind==='pickup' || o.kind==='prize') continue;
        const bx=b.mesh.position.x, by=b.mesh.position.y, bz=b.mesh.position.z;
        const dx=bx-o.pos.x, dy=by-o.pos.y, dz=bz-o.pos.z;
        let hit=false;
        switch(o.kind){
          case 'balloon': hit = (dx*dx+dy*dy+dz*dz < 4.0*4.0); break;
          case 'cable':   hit = (dx*dx+dy*dy+dz*dz < 1.6*1.6); break;
          // For tall structures: ignore Y in the radius check, then test
          // a generous Y range (the obstacle's hitBot..hitTop band).
          case 'pylon':   {
            const r=8.0; // generous lattice radius
            hit = (dx*dx+dz*dz < r*r) && by > (o.hitBot-2) && by < (o.hitTop+2);
            break;
          }
          case 'arch':    {
            const r=14.0;
            hit = (dx*dx+dz*dz < r*r) && by > (o.hitBot-2) && by < (o.hitTop+2);
            break;
          }
          case 'bldg':    {
            const r=Math.max(5, (o.r||5)+2);
            hit = (dx*dx+dz*dz < r*r) && by > (o.hitBot-2) && by < (o.hitTop+2);
            break;
          }
          case 'turret':  {
            const r=3.5;
            hit = (dx*dx+dz*dz < r*r) && by > (o.hitBot-1) && by < (o.hitTop+1);
            break;
          }
          default: continue;
        }
        if(hit){
          // initial HP per kind on first hit
          if(o.hp==null){
            o.hp = (o.kind==='balloon'||o.kind==='cable'||o.kind==='turret') ? 1
                 : (o.kind==='pylon') ? 2
                 : (o.kind==='bldg')  ? 3
                 : (o.kind==='arch')  ? 4
                 : 1;
          }
          o.hp -= 1;
          if(o.hp > 0){
            // non-fatal hit: small spark burst, bullet still dies
            explosionBurst(b.mesh.position.clone(), 0.25);
          } else {
            // destroyed: big burst + remove obstacle
            const scale = (o.kind==='arch'||o.kind==='bldg') ? 1.3
                        : (o.kind==='pylon') ? 1.0
                        : (o.kind==='balloon') ? 0.7
                        : 0.8;
            explosionBurst(o.mesh.position.clone(), scale);
            if(o.kind==='turret'){ o.active=false; }
            scene.remove(o.mesh);
            OBSTACLES.splice(j,1);
          }
          dead=true;
          break;
        }
      }
    }
    // vs terrain
    if(!dead){
      const gy=groundY(b.mesh.position.x, b.mesh.position.z);
      if(b.mesh.position.y < gy + 0.2){
        explosionBurst(b.mesh.position.clone(), 0.12);
        dead=true;
      }
    }
    if(dead){
      scene.remove(b.mesh);
      if(b.mesh.geometry) b.mesh.geometry.dispose();
      if(b.mesh.material) b.mesh.material.dispose();
      BULLETS.splice(i,1);
    }
  }
}

function tickParticles(dt){
  for(let i=PARTICLES.length-1;i>=0;i--){
    const p=PARTICLES[i];
    p.life -= dt;
    p.sprite.position.addScaledVector(p.vel, dt);
    if(p.kind==='debris'){
      p.vel.y -= 18*dt;
      p.sprite.rotation.x += p.spin.x*dt;
      p.sprite.rotation.y += p.spin.y*dt;
      p.sprite.rotation.z += p.spin.z*dt;
    } else {
      // inflate
      const s=p.sprite.scale.x + p.scaleRate*dt;
      p.sprite.scale.set(s,s,s);
      p.vel.multiplyScalar(1 - 1.2*dt);
      if(p.kind==='smoke'){ p.vel.y += 0.8*dt; }
      const a = Math.max(0, p.life/p.maxLife);
      p.sprite.material.opacity = a * (p.kind==='smoke'?0.7:1.0);
    }
    if(p.life<=0){
      scene.remove(p.sprite);
      if(p.sprite.material && p.kind!=='debris') p.sprite.material.dispose();
      if(p.sprite.geometry) p.sprite.geometry.dispose && p.sprite.geometry.dispose();
      PARTICLES.splice(i,1);
    }
  }
}

// Hold-button helper — works for finger, stylus and mouse. Pointer
// capture keeps the 'down' state active even if the cursor leaves the
// button while held, so desktop click-and-drag doesn't cancel fire/boost.
function wireHoldButton(el, onChange){
  el.addEventListener('pointerdown', e=>{
    e.stopPropagation(); e.preventDefault();
    try{ el.setPointerCapture(e.pointerId); }catch(_){}
    onChange(true); el.classList.add('active');
  });
  ['pointerup','pointercancel'].forEach(ev=>{
    el.addEventListener(ev, e=>{
      try{ el.releasePointerCapture(e.pointerId); }catch(_){}
      onChange(false); el.classList.remove('active');
    });
  });
}
const boostEl=document.getElementById('boostBtn');
wireHoldButton(boostEl, v=>{ TOUCH.boost=v; });
const fireEl=document.getElementById('fireBtn');
wireHoldButton(fireEl, v=>{ TOUCH.fire=v; });
